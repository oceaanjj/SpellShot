<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spell Shot</title>
  <style>
    @font-face {
      font-family: "PixelFont";
      src: url("assets/font/PressStart2P-Regular.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    /* ── All Complete overlay extras ─────────────── */
    @keyframes pressAnythingBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    #pressAnythingHint {
      font-family: "PixelFont", sans-serif;
      font-size: 9px;
      letter-spacing: 2.5px;
      color: rgba(255, 255, 255, 0.90);
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.55);
      animation: pressAnythingBlink 0.85s ease-in-out infinite;
      margin-top: 8px;
      text-transform: uppercase;
      text-align: center;
      pointer-events: none;
    }
    #confettiCanvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 29;          /* just above allCompleteOverlay (28) */
      display: none;
      image-rendering: pixelated;
    }

    #gameShell, #gameShell * {
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    #allCompleteStack {
      gap: 1.5rem;
      transform: scale(1.2);
    }

    #allCompleteStack img:first-child {
      width: min(420px, 88vw);
    }

    #allCompleteOverlay.active .game-over-actions .ui-btn {
      pointer-events: auto;
    }

    #allCompleteOverlay {
      z-index: 28;
    }

    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: "PixelFont", sans-serif;
      position: relative;
    }

    #gameShell {
      position: relative;
      width: 1035px;
      height: 596px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    @keyframes loadLogoFloat {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes loadPulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    @keyframes slideUpIn {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    #roundCompleteOverlay.active .overlay-stack {
      animation: slideUpIn 0.45s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    #allCompleteOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 15;
      background: rgba(0,0,0,0.75);
    }
    #allCompleteOverlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    #allCompleteOverlay.active .ui-btn {
      pointer-events: auto;
    }
    #gameShell canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #pauseBackdrop {
      position: absolute;
      inset: 0;
      background: rgba(5, 5, 12, 0.75);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
      z-index: 15;
    }

    #pauseBackdrop.active {
      opacity: 1;
      pointer-events: auto;
    }

    #pauseOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
      z-index: 20;
    }

    #pauseOverlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    #pauseOverlay #pausePanel,
    #pauseOverlay .pause-option {
      pointer-events: none;
    }

    #pauseOverlay.active #pausePanel,
    #pauseOverlay.active .pause-option {
      pointer-events: auto;
    }

    .ui-btn {
      border: none;
      padding: 0;
      margin: 0;
      background: transparent;
      cursor: pointer;
      outline: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      pointer-events: auto;
      transform-origin: center center;
      will-change: transform, filter;
      transition: transform 0.10s cubic-bezier(.22, .61, .36, 1), filter 0.10s ease;
      filter: drop-shadow(3px 4px 0px rgba(0, 0, 0, 0.55));
    }

    .ui-btn:hover {
      transform: scale(1.07) translateY(-3px);
      filter:
        brightness(1.22) drop-shadow(0 0 9px rgba(255, 210, 60, 0.90)) drop-shadow(3px 4px 0px rgba(0, 0, 0, 0.55));
    }

    .ui-btn.pressing {
      transform: scale(0.91) translateY(3px) !important;
      filter:
        brightness(1.55) drop-shadow(0 0 16px rgba(255, 130, 0, 1)) drop-shadow(2px 2px 0px rgba(0, 0, 0, 0.55)) !important;
      transition: transform 0.04s ease, filter 0.04s ease;
    }

    @keyframes btnRelease {
      0% {
        transform: scale(0.91) translateY(3px);
      }

      45% {
        transform: scale(1.13) translateY(-5px);
      }

      72% {
        transform: scale(0.97) translateY(0px);
      }

      100% {
        transform: scale(1.00) translateY(0px);
      }
    }

    .ui-btn.released {
      animation: btnRelease 0.32s cubic-bezier(.22, .61, .36, 1) forwards;
    }

    .ui-btn img {
      display: block;
      width: 58px;
      height: 58px;
      image-rendering: pixelated;
    }

    #pausePanel {
      background: rgba(8, 8, 24, 0.95);
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.45);
      padding: 28px 32px;
      box-shadow: 0 18px 32px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      min-width: 320px;
    }

    .pause-panel-title {
      color: #fefefe;
      font-size: 30px;
      letter-spacing: 10px;
      text-transform: uppercase;
      font-family: "PixelFont", sans-serif;
      text-shadow: 0 0 16px rgba(255, 255, 255, 0.65);
    }

    .pause-icon-row {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .pause-option {
      width: 72px;
      height: 72px;
      padding: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      justify-content: center;
      align-items: center;
    }

    .pause-option img {
      width: 46px;
      height: 46px;
    }

    :root {
      --hud-padding: 60px;
    }

    .ui-btn.disabled {
      pointer-events: none;
      filter: grayscale(0.9) brightness(0.7);
    }

    #pauseUI {
      position: absolute;
      top: var(--hud-padding);
      right: 60px;
      z-index: 16;
      pointer-events: auto;
    }

    #pauseToggle {
      transform: scale(0.9);
      padding-top: 6px;
      padding-bottom: 6px;
    }

    #pauseToggle img {
      width: 48px;
      height: 48px;
    }

    #mapOverlay {
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;
    }

    #borderOverlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 16;
    }

    #borderOverlay img {
      position: absolute;
      display: block;
      image-rendering: pixelated;
      pointer-events: none;
      width: auto;
      height: auto;
    }

    /* timer overlay remains centered at top */

    #timerOverlay {
      position: absolute;
      top: -64px;
      left: 50%;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #timerOverlay img {
      display: block;
      image-rendering: pixelated;
      height: auto;
      width: auto;
    }

    #timerOverlayText {
      position: absolute;
      top: 50%;
      left: 52%;
      transform: translate(-50%, -50%);
      font-family: "PixelFont", sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      color: #ffef72;
      text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
      pointer-events: none;
    }

    #targetWordOverlay {
      position: absolute;
      top: calc(100% + 0.1rem);
      left: 50%;
      transform: translateX(-50%) translateY(-8px) scale(0.92);
      display: flex;
      gap: 0;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      font-family: "PixelFont", sans-serif;
      font-size: 26px;
      letter-spacing: 1.2px;
      color: #fefefe;
      opacity: 0;
      transition: opacity 0.1s ease, transform 0.1s ease, filter 0.25s ease;
    }

    #targetWordOverlay.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    #targetWordOverlay .target-letter {
      width: 48px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0.35;
      transform: none;
      transition: none;
      text-shadow: 0 0 6px rgba(0, 0, 0, 0.7);
    }

    #targetWordOverlay.visible .target-letter {
      opacity: 0.35;
    }

    #targetWordOverlay.visible .target-letter.active {
      opacity: 1;
    }

    #targetWordOverlay .target-letter img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }

    #targetWordOverlay .target-letter.fallback {
      font-size: 26px;
      letter-spacing: 1.2px;
    }

    #targetWordOverlay.dimmed {
      filter: brightness(0.45);
    }

    @keyframes timerPulse {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        transform: translate(-50%, -50%) scale(1.15);
      }
    }

    #timerOverlayText.urgent {
      animation: timerPulse 0.5s ease-in-out infinite;
    }

    #overlayBackdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 8;
    }

    #overlayBackdrop.active {
      opacity: 1;
    }

    #overlayBackdrop.round {
      background: rgba(0, 0, 0, 0.48);
    }

    #gameOverOverlay,
    #roundCompleteOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      background: transparent;
    }

    #gameOverOverlay {
      z-index: 22;
    }

    #roundCompleteOverlay {
      z-index: 24;
    }

    #gameOverOverlay.active,
    #roundCompleteOverlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-align: center;
    }

    .overlay-stack img {
      width: min(320px, 80vw);
      height: auto;
      image-rendering: pixelated;
    }

    #gameOverOverlay .overlay-stack {
      gap: 1.5rem;
      transform: scale(1.2);
    }

    #gameOverOverlay .overlay-stack img {
      width: min(420px, 88vw);
    }

    .game-over-actions .ui-btn,
    .round-complete-actions .ui-btn {
      width: fit-content;
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
      pointer-events: none;
    }
    
    /* Game Over buttons - constrain to image size */
    .game-over-actions .ui-btn {
      width: 130px !important;
      height: 130px !important;
      margin: 0;
      display: flex !important;
      align-items: center;
      justify-content: center;
    }
    
    .game-over-actions {
      margin-top: 1px;
    }

    #gameOverOverlay.active .game-over-actions .ui-btn,
    #roundCompleteOverlay.active .round-complete-actions .ui-btn {
      pointer-events: auto;
    }

    .game-over-actions .overlay-icon,
    .round-complete-actions .overlay-icon {
      position: static !important;
      width: 64px;
      max-height: 64px;
      height: auto;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      display: block;
      image-rendering: pixelated;
    }
    
    /* Override for game-over buttons only */
    .game-over-actions .overlay-icon {
      width: 130px !important;
      height: 130px !important;
      max-height: 130px !important;
    }

    #roundCompleteOverlay .overlay-stack {
      gap: 0.75rem;
      max-width: 480px;
      transform: scale(1.15);
    }

    #roundCompleteOverlay .overlay-instruction {
      font-size: 10px;
      letter-spacing: 1.25px;
      color: rgba(255, 255, 255, 0.9);
      margin: 0;
    }

    #roundCompleteOverlay .overlay-instruction.overlay-subtext {
      font-size: 8px;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.65);
    }

    #roundCompleteOverlay .overlay-reason {
      font-size: 32px;
      letter-spacing: 2px;
      color: #7efc7f;
      text-shadow: 0 0 16px rgba(126, 252, 127, 0.9);
    }

    #gameOverOverlay .overlay-reason {
      font-size: 12px;
      letter-spacing: 1.5px;
      color: #fefefe;
    }

    .overlay-reason {
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
      margin: 0;
    }

    .game-over-actions {
      display: flex;
      justify-content: center;
      gap: 3rem;
      font-size: 0;
      position: relative;
    }
    
    .game-over-actions .ui-btn {
      position: relative;
      width: 80px !important;
      height: 80px !important;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .round-complete-actions {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      font-size: 0;
    }

    .round-complete-actions .overlay-icon {
      width: 80px;
      max-height: 80px;
    }

    #pauseUI.hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div id="loadingScreen" style="
      position: fixed; inset: 0; z-index: 999;
      background: #0a0a0e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
    ">
    <img src="assets/logo.png" style="width: 400px; image-rendering: pixelated;
        animation: loadLogoFloat 1.5s ease-in-out infinite;" />
    <div style="margin-top: 32px; font-family: 'PixelFont', sans-serif;
        font-size: 22px; color: #FFD700; letter-spacing: 4px;
        animation: loadPulse 1s ease-in-out infinite;">LOADING...</div>
  </div>

  <div id="gameShell">
    <div id="overlayBackdrop"></div>
    <div id="borderOverlay">
      <img id="borderLeft" src="assets/map1/border/leftBorder.png" alt="Left border" />
      <img id="borderRight" src="assets/map1/border/rightBorder.png" alt="Right border" />
      <img id="borderBottom" src="assets/map1/border/bottomBorder.png" alt="Bottom border" />
    </div>
    <canvas id="c"></canvas>
    <div id="pauseBackdrop"></div>
    <div id="pauseOverlay">
      <div id="pausePanel">
        <div class="pause-panel-title">Paused</div>
        <div class="pause-icon-row">
          <button class="pause-option ui-btn" type="button" data-pause-action="resume" role="menuitem" aria-label="Resume gameplay">
            <img src="assets/resume.png" alt="Resume" />
          </button>
          <button class="pause-option ui-btn" type="button" data-pause-action="restart" role="menuitem" aria-label="Restart level">
            <img src="assets/restartButton.png" alt="Restart" /> <!-- swap with your asset -->
          </button>
          <button class="pause-option ui-btn" type="button" data-pause-action="setting" role="menuitem" aria-label="Open settings">
            <img src="assets/setting.png" alt="Setting" />
          </button>
          <button class="pause-option ui-btn" type="button" data-pause-action="home" role="menuitem" aria-label="Go to home">
            <img src="assets/home.png" alt="Home" />
          </button>
        </div>
      </div>
    </div>
    <div id="pauseUI">
      <button id="pauseToggle" class="ui-btn" type="button" aria-label="Pause the game">
        <img src="assets/pause.png" alt="Pause" />
      </button>
    </div>
    <div id="mapOverlay">
      <div id="timerOverlay">
        <img id="timerOverlayImage" src="assets/map1/timerBox.png" alt="Timer Box" />
        <span id="timerOverlayText">1:00</span>
        <div id="targetWordOverlay"></div>
      </div>
    </div>
    <div id="gameOverOverlay">
      <div class="overlay-stack">
        <img id="gameOverTitleImage" src="assets/button/gameOver1.png" alt="Game Over" />
        <p id="gameOverReason" class="overlay-reason"></p>
        <div class="game-over-actions">
          <button id="gameOverRetry" class="ui-btn" type="button">
            <img id="gameOverRetryImage" class="btn overlay-icon" src="assets/button/retryButton1.png" alt="Retry level" />
          </button>
          <button id="gameOverExit" class="ui-btn" type="button">
            <img id="gameOverExitImage" class="btn overlay-icon" src="assets/button/returnHomeButton1.png" alt="Back to levels" />
          </button>
        </div>
      </div>
    </div>
    <div id="roundCompleteOverlay">
      <div class="overlay-stack">
        <p id="roundCompleteReason" class="overlay-reason">Round Complete</p>
        <p id="roundCompleteInstruction" class="overlay-instruction"></p>
        <p class="overlay-instruction overlay-subtext">Use the home icon to leave.</p>
        <div class="round-complete-actions">
          <button id="roundCompleteBack" class="ui-btn" type="button" aria-label="Return to main menu">
            <img class="btn overlay-icon" src="assets/home.png" alt="Return home" />
          </button>
          <button id="roundCompleteNext" class="ui-btn" type="button" aria-label="Continue to next round">
            <img class="btn overlay-icon" src="assets/resume.png" alt="Resume next round" />
          </button>
        </div>
      </div>
    </div>

  <canvas id="confettiCanvas"></canvas>

  <div id="allCompleteOverlay">
    <div class="overlay-stack" id="allCompleteStack">
      <img src="assets/congrats.png" alt="All Levels Complete" />
      <p id="pressAnythingHint">— press anything to return home —</p>
    </div>
  </div>
  </div>

  <script src="js/cannonSkins.js"></script>
  <script src="js/sfx.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/music.js"></script>
  <script src="js/coinAnimator.js"></script>
  <script src="js/pause.js"></script>

  <script>
    let comboCount = 0;
    let lastCorrectHitTime = 0;
    const COMBO_WINDOW_MS = 4000; // 4 seconds between hits to count as combo
    let comboMessage = '';
    let comboMessageTimer = 0;
    const COMBO_MESSAGE_DURATION = 80;
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;


    ctx.font = "10px PixelFont";


    const gameShellEl = document.getElementById('gameShell');
    gameShellEl.addEventListener('contextmenu', e => e.preventDefault());
    gameShellEl.addEventListener('copy', e => e.preventDefault());
    gameShellEl.addEventListener('selectstart', e => e.preventDefault());
    // --------------------------------------------------
    // IMPORTING FILES
    // --------------------------------------------------
    const bgImg = new Image();
    const mapBridgeImage = new Image();
    const CHARACTER_SELECTION_KEY = "spellshot-selected-character";
    const CHARACTER_SPRITES = [
      "girlieSprite.png",
      "markSprite.png",
      "pattieSprite.png",
      "peterSprite.png"
    ];
    const DEFAULT_CHARACTER_NAME = CHARACTER_SPRITES[0];
    const CHARACTER_FRAME_METADATA = {
      "girlieSprite.png": [
        { width: 1930, center: 1057 },
        { width: 1930, center: 1057 },
      ],
      "markSprite.png": [
        { width: 1585, center: 1051.5 },
        { width: 1562, center: 1043 },
      ],
      "pattieSprite.png": [
        { width: 1919, center: 1026.5 },
        { width: 1919, center: 1026.5 },
      ],
      "peterSprite.png": [
        { width: 1539, center: 769.5 },
        { width: 1579, center: 789.5 },
      ],
    };
    const CHARACTER_DISPLAY_TARGET = { width: 768, height: 1024 };
    let currentCharacterSpriteName = DEFAULT_CHARACTER_NAME;

    function triggerComboEffect(ts, block) {
  const now = ts || performance.now();
  const timeSinceLast = now - lastCorrectHitTime;

  if (timeSinceLast <= COMBO_WINDOW_MS) {
    comboCount++;
  } else {
    comboCount = 1;
  }
  lastCorrectHitTime = now;

  if (comboCount === 2) {
    playGoodSfx();
    floatingPopups.push({
      x: block ? block.x + block.width / 2 : GAME_W / 2,
      y: block ? block.y - 12 : GAME_H / 2,
      text: 'GREAT!',
      color: '#7efc7f',
      life: 60,
      vy: -0.6,
      alpha: 1
    });
  } else if (comboCount >= 3) {
    playUnbelievableSfx();
    floatingPopups.push({
      x: block ? block.x + block.width / 2 : GAME_W / 2,
      y: block ? block.y - 12 : GAME_H / 2,
      text: 'UNBELIEVABLE!',
      color: '#ff9f00',
      life: 60,
      vy: -0.6,
      alpha: 1
    });
  }
}
    function getCharacterFrameAdjustment(frameIndex) {
      const referenceFrames = CHARACTER_FRAME_METADATA[DEFAULT_CHARACTER_NAME];
      const selectedFrames = CHARACTER_FRAME_METADATA[currentCharacterSpriteName] || referenceFrames;
      const reference = referenceFrames?.[frameIndex] ?? referenceFrames?.[0];
      const metadata = selectedFrames?.[frameIndex] ?? selectedFrames?.[0] ?? reference;
      if (!reference || !metadata || typeof reference.center !== "number" || typeof metadata.center !== "number") {
        return 0;
      }
      const centerDelta = metadata.center - reference.center;
      return centerDelta * SCALE;
    }

    function getCharacterDisplayScale() {
      const EXTRA_SCALE = 0.70;
      if (FRAME_W <= 0 || FRAME_H <= 0) return EXTRA_SCALE;
      const baseWidth = FRAME_W * SCALE;
      const baseHeight = FRAME_H * SCALE;
      if (baseWidth <= 0 || baseHeight <= 0) return EXTRA_SCALE;
      const widthScale = CHARACTER_DISPLAY_TARGET.width / baseWidth;
      const heightScale = CHARACTER_DISPLAY_TARGET.height / baseHeight;
      const targetScale = Math.min(widthScale, heightScale, 1);
      return Math.max(0.35, (targetScale > 0 ? targetScale : 1) * EXTRA_SCALE);
    }

    function getSelectedCharacterSpritePath() {
      let selectedIndex = 0;
      try {
        const raw = localStorage.getItem(CHARACTER_SELECTION_KEY);
        const parsed = parseInt(raw, 10);
        if (!Number.isNaN(parsed)) {
          selectedIndex = parsed;
        }
      } catch (error) {

const floatingHearts = [];
const HEART_SPAWN_INTERVAL_MS = 8000; // one heart every 8s
const HEART_SIZE = 36;
let lastHeartSpawnTime = 0;

function spawnFloatingHeart(ts) {
  if (gameOver || gamePaused || roundCompleteActive) return;
  if (ts - lastHeartSpawnTime < HEART_SPAWN_INTERVAL_MS) return;
  lastHeartSpawnTime = ts;

  // Random chance — not every interval
  if (Math.random() > 0.4) return;

  floatingHearts.push({
    x: 320 + Math.random() * (GAME_W - 480),
    y: GAME_H - 100,
    vx: (Math.random() - 0.5) * 1.5,
    vy: -(0.6 + Math.random() * 0.4),
    alpha: 1,
    collected: false
  });
}

function updateFloatingHearts() {
  for (let i = floatingHearts.length - 1; i >= 0; i--) {
    const h = floatingHearts[i];
    h.y += h.vy;

    // Bounce off left and right walls
    if (h.x <= 0) { h.x = 0; h.vx = Math.abs(h.vx); }
    if (h.x + HEART_SIZE >= GAME_W) { h.x = GAME_W - HEART_SIZE; h.vx = -Math.abs(h.vx); }
    h.x += h.vx;

    // Check collision with any cannonball
    for (const ball of cannonBalls) {
      const dx = ball.x - (h.x + HEART_SIZE / 2);
      const dy = ball.y - (h.y + HEART_SIZE / 2);
      if (Math.sqrt(dx * dx + dy * dy) < HEART_SIZE / 2 + BALL_RADIUS) {
        if (!h.collected) {
          h.collected = true;
          const state = window.TargetWord?.state;
          if (state && state.lives < state.maxLives) {
            state.lives = Math.min(state.maxLives, state.lives + 1);
            markTargetWordDirty();
          }
        }
      }
    }

    // Only remove if collected or floated off the top
    if (h.y + HEART_SIZE < 0 || h.collected) {
      floatingHearts.splice(i, 1);
    }
  }
}

function drawFloatingHearts() {
  if (!floatingHearts.length) return;
  floatingHearts.forEach(h => {
    if (!heartImage || !heartImage.complete) return;
    ctx.save();
    ctx.globalAlpha = h.alpha;
    // Gentle pulse
    const pulse = 1 + Math.sin(Date.now() * 0.005) * 0.08;
    ctx.translate(h.x + HEART_SIZE / 2, h.y + HEART_SIZE / 2);
    ctx.scale(pulse, pulse);
    ctx.drawImage(heartImage, -HEART_SIZE / 2, -HEART_SIZE / 2, HEART_SIZE, HEART_SIZE);
    ctx.restore();
  });
}

    function getBorderDimensions(key, element) {

      if (reference && reference.width > 0 && reference.height > 0) {

          height: element.naturalHeight

    function updateBorderOverlayPositions() {
      const topScale = clampBorderScale(BORDER_TOP_SCALE);

      if (borderLeftElem) {
        const dims = getBorderDimensions("left", borderLeftElem);

          borderBottomElem.style.height = `${height}px`;
          borderBottomElem.style.left = `${left}px`;

        ? state.sessionBaselineCoins
        : 0;

      const accumulated = Math.max(

        (state.coins - baseline) + state.sessionCoins

    function onWordCompleted() {

      wordsCompletedThisLevel++;

    function resetTimerForRound() {
      stopTickingSfx();
      timerRemaining = TIMER_DURATION_SECONDS;
      lastTimerTimestamp = null;

      timerOverlayText?.classList.remove('urgent');

    function updateTimer(ts) {
      if (timerExpired || timerRemaining <= 0) return;
      if (!lastTimerTimestamp) {
        lastTimerTimestamp = ts;
        return;
      }

      const deltaSeconds = (ts - lastTimerTimestamp) / 1000;
      lastTimerTimestamp = ts;
      timerRemaining = Math.max(0, timerRemaining - deltaSeconds);

      if (timerRemaining <= 10 && timerRemaining > 0) {
        if (!roundCompleteActive && !gameOver) startTickingSfx();
        timerOverlayText?.classList.add('urgent');
        if (timerOverlayText) timerOverlayText.style.color = '#ff4f4f';
      } else {
        timerOverlayText?.classList.remove('urgent');
        if (timerOverlayText) timerOverlayText.style.color = '#ffef72';
      }

      if (timerRemaining <= 0) {
        timerRemaining = 0;
        stopTickingSfx();
        handleTimerExpiry();
      }

      updateTimerOverlayText();
    }

      const minutes = Math.floor(displaySeconds / 60);
      const seconds = displaySeconds % 60;
      const secondsStr = seconds.toString().padStart(2, "0");
      return `${minutes}:${secondsStr}`;

    // --------------------------------------------------

    const FRAMES = 2;

    let FRAME_W = 0;

    // --------------------------------------------------
    // WHOLE PLAYER SCALE + POSITION
    // ito lang ang gamitin para lumiit at gumalaw ang player, wag na galawin yung original settings sa taas
    // --------------------------------------------------
    const PLAYER_SCALE = 0.15;
    const PLAYER_X = 60;
    const PLAYER_Y = 480;

    // --------------------------------------------------
    // CANNON SETTINGS (KEEP SAME)
    // --------------------------------------------------
    const MOUNT_X = 500;
    const MOUNT_Y = 770;

    const CANON_PIVOT_X = 100;
    const CANON_PIVOT_Y = 410;

    const CANON_SCALE = 0.38;

    let cannonAngle = 0;
    const MIN_ANGLE = -Math.PI * 0.45;
    const MAX_ANGLE = Math.PI * 0.35;

    // blink

    const WHEEL_SCALE = 1.18;

    // LETTER BOX GENERATOR
    function generateLetterBlocks() {
      letterBlocks.length = 0;
      const wordLetters = [...currentWord];
      const uniqueLettersInWord = [...new Set(wordLetters)];

      const distractors = [];
      // number of text generator
      const maxDistractors = Math.min(4, 26 - uniqueLettersInWord.length);
      while (distractors.length < maxDistractors) {
        let letter = alphabet[Math.floor(Math.random() * alphabet.length)];
        if (!uniqueLettersInWord.includes(letter) && !distractors.includes(letter)) {
          distractors.push(letter);
        }
      }

      const allLetters = [...wordLetters, ...distractors];

      const pivotY = PLAYER_Y + (MOUNT_Y * SCALE) * PLAYER_SCALE;
      const marginAboveCannon = 60;
      const defaultMinY = 100;
      const defaultMaxY = GAME_H - 120;

      let computedMaxY = Math.min(defaultMaxY, Math.floor(pivotY - marginAboveCannon));
      if (computedMaxY < defaultMinY + LETTER_BLOCK_SIZE) {
        computedMaxY = Math.max(defaultMinY + LETTER_BLOCK_SIZE, defaultMaxY);
      }

      const bandHeight = 100;
      const bandMinY = Math.max(defaultMinY, computedMaxY - bandHeight);
      const bandMaxY = computedMaxY;

      const safeZone = {
        minX: 320,
        maxX: GAME_W - 160,
        minY: bandMinY,
        maxY: bandMaxY
      };

      const minDistance = LETTER_BLOCK_SIZE + 20;
      const positions = [];

      const maxAttempts = Math.max(allLetters.length * 25, 80);
      for (let attempt = 0; attempt < maxAttempts && positions.length < allLetters.length; attempt++) {
        const x = safeZone.minX + Math.random() * (safeZone.maxX - safeZone.minX);
        const y = safeZone.minY + Math.random() * (safeZone.maxY - safeZone.minY);

        let collides = false;
        for (let pos of positions) {
          const dx = x - pos.x;
          const dy = y - pos.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < minDistance) {
            collides = true;
            break;
          }
        }

        if (!collides) positions.push({ x, y });
      }

      if (positions.length < allLetters.length) {
        const extraNeeded = allLetters.length - positions.length;
        for (let i = 0; i < extraNeeded; i++) {
          const x = safeZone.minX + Math.random() * (safeZone.maxX - safeZone.minX);
          const y = Math.max(defaultMinY, Math.min(bandMaxY, bandMinY + Math.random() * bandHeight));
          positions.push({ x, y });
        }
      }

      allLetters.forEach((letter, index) => {
        if (index < positions.length) {
          const pos = positions[index];
          letterBlocks.push({
            x: pos.x,
            y: pos.y,
            width: LETTER_BLOCK_SIZE,
            height: LETTER_BLOCK_SIZE,
            letter,
            isCorrect: currentWord.includes(letter),
            wordIndex: index < wordLetters.length ? index : -1,
            flashTime: 0,
            isDestroyed: false,
            shakeTimer: 0,
            color: "#FFD700",
            isActive: true,
            cooldownTimer: 0,
            animationQueued: null,
            animationState: null,
            fallVelocity: 0,
            vx: 0,
            opacity: 1,
            jumpTimer: 0,
            jumpDuration: 0,
            jumpHeight: 0,
            jumpOffset: 0,
            wrongFlash: 0
          });
        }
      });

      ensureAllLettersAimable();
    }

    function ensureAllLettersAimable() {
      const minDistance = LETTER_BLOCK_SIZE + 30;

      letterBlocks.forEach((block, blockIndex) => {
        let colliding = true;
        let attempts = 0;

        while (colliding && attempts < 50) {
          colliding = false;

          for (let i = 0; i < letterBlocks.length; i++) {
            if (i === blockIndex) continue;

            const other = letterBlocks[i];
            const dx = block.x - other.x;
            const dy = block.y - other.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < minDistance) {
              colliding = true;
              break;
            }
          }

          if (colliding) {
            block.x = 300 + Math.random() * (GAME_W - 450);
            block.y = 100 + Math.random() * (GAME_H - 250);
            attempts++;
          }
        }
      });
    }

    function ensureWordLettersAccessible() {
      const cannonX = PLAYER_X + (MOUNT_X * SCALE) * PLAYER_SCALE;
      const cannonY = PLAYER_Y + (MOUNT_Y * SCALE) * PLAYER_SCALE;

      letterBlocks.forEach(block => {
        if (block.wordIndex < 0) return;

        let isBlocked = true;
        let attempts = 0;

        while (isBlocked && attempts < 10) {
          isBlocked = false;

          const dx = block.x + block.width / 2 - cannonX;
          const dy = block.y + block.height / 2 - cannonY;
          const distance = Math.sqrt(dx * dx + dy * dy);
          const steps = Math.floor(distance / 10);

          for (let i = 1; i < steps; i++) {
            const checkX = cannonX + (dx * i / steps);
            const checkY = cannonY + (dy * i / steps);

            for (let otherBlock of letterBlocks) {
              if (otherBlock === block) continue;

              const closestX = Math.max(otherBlock.x, Math.min(checkX, otherBlock.x + otherBlock.width));
              const closestY = Math.max(otherBlock.y, Math.min(checkY, otherBlock.y + otherBlock.height));

              const distanceX = checkX - closestX;
              const distanceY = checkY - closestY;
              const distanceSquared = distanceX * distanceX + distanceY * distanceY;

              if (distanceSquared <= BALL_RADIUS * BALL_RADIUS) {
                isBlocked = true;
                break;
              }
            }

            if (isBlocked) break;
          }

          if (isBlocked) {
            block.x = 300 + Math.random() * (GAME_W - 450);
            block.y = 100 + Math.random() * (GAME_H - 250);
            attempts++;
          }
        }
      });
    }

    function spawnLetterHitParticles(x, y) {
      const burstColor = "#ffe06a";
      const sparkleCount = 26;
      for (let i = 0; i < sparkleCount; i++) {
        const angle = (Math.PI * 2 * i) / sparkleCount + (Math.random() - 0.5) * 0.3;
        const speed = 2 + Math.random() * 6;
        letterHitParticles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: 0.018 + Math.random() * 0.022,
          radius: 2 + Math.random() * 3,
          color: burstColor,
          star: i % 3 === 0
        });
      }
    }

    function triggerLetterSuccessFlash(x, y) {
      successFlash = {
        timer: SUCCESS_FLASH_DURATION,
        x,
        y
      };
      spawnLetterHitParticles(x, y);
    }

    function updateLetterHitEffects() {
      for (let i = letterHitParticles.length - 1; i >= 0; i--) {
        const p = letterHitParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        p.vy += 0.08;
        p.vx *= 0.95;
        if (p.life <= 0) letterHitParticles.splice(i, 1);
      }
      if (successFlash.timer > 0) successFlash.timer--;
    }

    function drawLetterHitParticles() {
      if (!letterHitParticles.length) return;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      letterHitParticles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life);
        if (p.star) {
          ctx.strokeStyle = p.color;
          ctx.lineWidth = 2;
          const size = p.radius * Math.max(1, p.life);
          ctx.beginPath();
          ctx.moveTo(p.x - size, p.y);
          ctx.lineTo(p.x + size, p.y);
          ctx.moveTo(p.x, p.y - size);
          ctx.lineTo(p.x, p.y + size);
          const diag = size * 0.65;
          ctx.moveTo(p.x - diag, p.y - diag);
          ctx.lineTo(p.x + diag, p.y + diag);
          ctx.moveTo(p.x + diag, p.y - diag);
          ctx.lineTo(p.x - diag, p.y + diag);
          ctx.stroke();
        } else {
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, Math.max(1, p.radius * p.life), 0, Math.PI * 2);
          ctx.fill();
        }
      });
      ctx.restore();
    }

    function drawLetterSuccessFlash() {
      if (successFlash.timer <= 0) return;
      const progress = successFlash.timer / SUCCESS_FLASH_DURATION;
      const radius = 160 * (1 - progress);
      const alpha = 0.35 * progress;
      const grad = ctx.createRadialGradient(
        successFlash.x,
        successFlash.y,
        0,
        successFlash.x,
        successFlash.y,
        radius
      );
      grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
      grad.addColorStop(1, "rgba(255,255,255,0)");
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.fillStyle = grad;
      ctx.fillRect(
        successFlash.x - radius,
        successFlash.y - radius,
        radius * 2,
        radius * 2
      );
      ctx.restore();
    }

    function drawLetterBlocks() {
      letterBlocks.forEach(block => {
        if (block.isDestroyed) return;

        ctx.save();

        let shakeX = 0;
        let shakeY = 0;
        if (block.shakeTimer > 0) {
          const shakeIntensity = Math.min(block.shakeTimer / 10, 1) * 5;
          shakeX = (Math.random() - 0.5) * shakeIntensity;
          shakeY = (Math.random() - 0.5) * shakeIntensity;
          block.shakeTimer = Math.max(0, block.shakeTimer - 1);
        }

        let drawX = block.x + shakeX;
        let drawY = block.y + shakeY;
        if (block.animationState === "jumping") {
          drawY -= block.jumpOffset || 0;
        }

        let alpha = block.opacity ?? 1;
        let flashOverlay = false;
        if (block.flashTime > 0) {
          block.flashTime = Math.max(0, block.flashTime - 16);
          const currentTime = Date.now();
          const flashIntensity = Math.sin(currentTime * 0.02) * 0.5 + 0.5;
          const flashAlpha = 0.5 + flashIntensity * 0.5;
          alpha *= flashAlpha;
          flashOverlay = true;
        }

        ctx.globalAlpha = alpha;

        const letterImg = letterImages[block.letter];
        if (letterImg && letterImg.complete && letterImg.naturalWidth > 0) {
          ctx.drawImage(
            letterImg,
            drawX, drawY, block.width, block.height
          );
        } else {
          ctx.fillStyle = "white";
          ctx.font = "bold 20px PixelFont";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(
            block.letter,
            drawX + block.width / 2,
            drawY + block.height / 2
          );
        }

        if (flashOverlay) {
          ctx.globalAlpha = 0.6;
          ctx.fillStyle = block.color;
          ctx.fillRect(drawX, drawY, block.width, block.height);
        }

        if (block.wrongFlash > 0) {
          ctx.save();
          ctx.globalAlpha = Math.min(block.wrongFlash / 18, 1) * 0.65;
          ctx.fillStyle = "rgba(220, 28, 28, 1)";
          ctx.fillRect(drawX, drawY, block.width, block.height);
          ctx.restore();
        }

        ctx.restore();
      });
    }

    function hasRemainingLetter(letter) {
      if (!window.TargetWord) return false;
      const state = TargetWord.state;
      if (!state || !state.word) return false;
      for (let i = 0; i < state.word.length; i++) {
        if (!state.progress[i] && state.word[i] === letter) {
          return true;
        }
      }
      return false;
    }

    function queueBlockAnimation(block, type = null, shakeDuration = 18) {
      block.shakeTimer = shakeDuration;
      block.animationQueued = type;
      block.animationState = null;
      block.jumpOffset = 0;
      block.jumpTimer = 0;
      block.cooldownTimer = type === null ? shakeDuration : 0;
      block.isActive = false;
    }

    function startQueuedAnimation(block) {
      if (!block.animationQueued || block.animationState) return;
      if (block.animationQueued === "fall") {
        block.animationState = "falling";
        block.fallVelocity = -1.5;
        block.vx = (Math.random() - 0.5) * 3;
        block.opacity = 1;
      } else if (block.animationQueued === "jump") {
        block.animationState = "jumping";
        block.jumpTimer = 0;
        block.jumpDuration = 26;
        block.jumpHeight = 34;
        block.jumpOffset = 0;
      }
      block.animationQueued = null;
    }

    function updateBlockAnimations() {
      letterBlocks.forEach(block => {
        if (block.wrongFlash > 0) {
          block.wrongFlash = Math.max(0, block.wrongFlash - 1);
        }
        if (block.cooldownTimer > 0) {
          block.cooldownTimer--;
          if (block.cooldownTimer <= 0 && !block.animationState && !block.isDestroyed) {
            block.isActive = true;
          }
        }

        if (block.animationQueued && block.shakeTimer <= 0) {
          startQueuedAnimation(block);
        }

        if (block.animationState === "falling") {
          block.fallVelocity += 0.3;
          block.y += block.fallVelocity;
          block.x += block.vx;
          block.opacity = Math.max(0, block.opacity - 0.02);
          if (block.y > GAME_H + 80 || block.opacity <= 0) {
            block.isDestroyed = true;
          }
        }

        if (block.animationState === "jumping") {
          block.jumpTimer++;
          const progress = Math.min(block.jumpTimer / block.jumpDuration, 1);
          block.jumpOffset = Math.sin(progress * Math.PI) * block.jumpHeight;
          if (progress >= 1) {
            block.isDestroyed = true;
          }
        }
      });
    }

    function respawnLetter(letter) {
      if (gameOver || roundCompleteActive) return;

      const safeZone = { minX: 320, maxX: GAME_W - 160, minY: 100, maxY: 380 };
      let x, y, attempts = 0, collides;

      do {
        collides = false;
        x = safeZone.minX + Math.random() * (safeZone.maxX - safeZone.minX);
        y = safeZone.minY + Math.random() * (safeZone.maxY - safeZone.minY);
        for (const b of letterBlocks) {
          if (b.isDestroyed) continue;
          const dx = x - b.x, dy = y - b.y;
          if (Math.sqrt(dx*dx + dy*dy) < LETTER_BLOCK_SIZE + 20) { collides = true; break; }
        }
        attempts++;
      } while (collides && attempts < 40);

      letterBlocks.push({
        x, y,
        width: LETTER_BLOCK_SIZE, height: LETTER_BLOCK_SIZE,
        letter,
        isCorrect: currentWord.includes(letter),
        wordIndex: -1, // treated as a loose block
        flashTime: 0, isDestroyed: false, shakeTimer: 0,
        color: "#FFD700", isActive: true, cooldownTimer: 0,
        animationQueued: null, animationState: null,
        fallVelocity: 0, vx: 0, opacity: 1,
        jumpTimer: 0, jumpDuration: 0, jumpHeight: 0, jumpOffset: 0,
        wrongFlash: 0
      });
    }

    function processBlockHit(block) {
      if (gameOver || !block.isActive || block.isDestroyed || !window.TargetWord) return;
      const state = TargetWord.state;
      if (!state) return;

      // Reduce ammo on collision (only once per block hit)
      if (state.ammo > 0) {
        state.ammo = Math.max(0, state.ammo - 1);
      }

      block.isActive = false;

      const nextIndex = state.progress.findIndex(flag => !flag);
      const nextLetter = nextIndex >= 0 ? state.word[nextIndex] : null;
      if (nextLetter && block.letter === nextLetter) {
        playHitSfx();
        triggerComboEffect(performance.now(), block);
        const wordFinished = TargetWord.onLetterHit(block.letter, true);
        spawnHitPopup(block, COIN_HIT_REWARD);
        triggerCoinCounterCountUp();
        markTargetWordDirty();
        triggerLetterSuccessFlash(
          block.x + block.width / 2,
          block.y + block.height / 2
        );
        queueBlockAnimation(block, "jump", 22);
        if (wordFinished) {
          onWordCompleted();
          return;
        }
      } else if (hasRemainingLetter(block.letter)) {
        // TargetWord.onLetterHit(block.letter, false);
        if (window.TargetWord?.state) {
          window.TargetWord.state.lives = Math.max(0, window.TargetWord.state.lives - 1);
        }
        markTargetWordDirty();
        block.wrongFlash = 24;
        queueBlockAnimation(block, "fall", 18);
        // queueBlockAnimation(block, null, 20);
        const letterToRespawn = block.letter;
        setTimeout(() => respawnLetter(letterToRespawn), 600);
        checkGameOverForPlayer();
      } else {
        // TargetWord.onLetterHit(block.letter, false);
        if (window.TargetWord?.state) {
          window.TargetWord.state.lives = Math.max(0, window.TargetWord.state.lives - 1);
        }
        markTargetWordDirty();
        block.wrongFlash = 24;
        queueBlockAnimation(block, "fall", 18);
        checkGameOverForPlayer();
      }
      checkGameOverForPlayer();
    }

    function handleMissedShot() {
      if (gameOver) return;
      if (window.TargetWord?.state) {
        window.TargetWord.state.ammo = Math.max(0, window.TargetWord.state.ammo - 1);
        markTargetWordDirty();
        checkGameOverForPlayer(); 
      }
    }

    function checkGameOverForPlayer() {
      if (gameOver) return;
      if (!window.TargetWord) return;
      const state = TargetWord.state;
      if (!state) return;
      if (state.lives <= 0) {
        handleGameOver("lives");
        return;
      }
      if (state.ammo <= 0) {
        handleGameOver("ammo");
        return;
      }
    }

    function handleGameOver(reason) {
      comboCount = 0;
      comboMessageTimer = 0;
      hidePauseOverlay();
      if (gameOver) return;
      if (window.TargetWord) TargetWord.discardSessionCoins();
      gameOver = true;

      const pauseUI = document.getElementById('pauseUI');
      if (pauseUI) pauseUI.style.display = 'none';

    function getCannonPivotPosition() {
      const pivotX = PLAYER_X + (MOUNT_X * SCALE) * PLAYER_SCALE;
      const pivotY = PLAYER_Y + (MOUNT_Y * SCALE) * PLAYER_SCALE;
      return { x: pivotX, y: pivotY };
    }

    function getCannonTipPosition() {
      const pivot = getCannonPivotPosition();
      const rawLength = Math.max(120, ((imgCanon.complete && imgCanon.naturalWidth > 0 ? imgCanon.naturalWidth : 220)) - CANON_PIVOT_X);
      const scaledLength = rawLength * CANON_SCALE * PLAYER_SCALE;
      return {
        x: pivot.x + Math.cos(cannonAngle) * scaledLength,
        y: pivot.y + Math.sin(cannonAngle) * scaledLength
      };
    }

    function fireCannon() {
      if (gameOver || gamePaused || roundCompleteActive) return;

      playFireSfx();

      const tip = getCannonTipPosition();
      const direction = {
        x: Math.cos(cannonAngle),
        y: Math.sin(cannonAngle)
      };

      cannonBalls.push({
        x: tip.x,
        y: tip.y,
        vx: direction.x * BALL_SPEED,
        vy: direction.y * BALL_SPEED,
        bounced: 0,
        trail: [] 
      });
    }

    function updateCannonBalls() {
      if (!cannonBalls.length) return;
      const preserved = [];

      for (const ball of cannonBalls) {
        ball.x += ball.vx;
        ball.y += ball.vy;

        ball.trail.push({ x: ball.x, y: ball.y });
        if (ball.trail.length > 14) ball.trail.shift();

        if (ball.y <= BALL_RADIUS && ball.vy < 0) {
          ball.y = 2 * BALL_RADIUS - ball.y;   // ← reflect position back past wall
          ball.vy *= -1;
          ball.bounced++;
        } else if (ball.y >= GAME_H - BALL_RADIUS && ball.vy > 0) {
          ball.y = 2 * (GAME_H - BALL_RADIUS) - ball.y;   // ← reflect
          ball.vy *= -1;
          ball.bounced++;
        }

        if (ball.x <= BALL_RADIUS && ball.vx < 0) {
          ball.x = 2 * BALL_RADIUS - ball.x;   // ← reflect
          ball.vx *= -1;
          ball.bounced++;
        } else if (ball.x >= GAME_W - BALL_RADIUS && ball.vx > 0) {
          ball.x = 2 * (GAME_W - BALL_RADIUS) - ball.x;   // ← reflect
          ball.vx *= -1;
          ball.bounced++;
        }

        const hitBlock = letterBlocks.find((block) => {
          if (!block.isActive || block.isDestroyed) return false;
          return (
            ball.x + BALL_RADIUS >= block.x &&
            ball.x - BALL_RADIUS <= block.x + block.width &&
            ball.y + BALL_RADIUS >= block.y &&
            ball.y - BALL_RADIUS <= block.y + block.height
          );
        });

        const isOutOfBounds =
          ball.x < -BALL_RADIUS * 2 ||
          ball.x > GAME_W + BALL_RADIUS * 2 ||
          ball.y < -BALL_RADIUS * 2 ||
          ball.y > GAME_H + BALL_RADIUS * 2;

        if (hitBlock) {
          processBlockHit(hitBlock);
          continue;
        }
        if (isOutOfBounds) {
          handleMissedShot();
          continue;
        }

        preserved.push(ball);
      }

      cannonBalls.length = 0;
      cannonBalls.push(...preserved);
    }

    function drawBallTrails() {
      if (!cannonBalls.length) return;
      const rgb = window.BallSkins ? window.BallSkins.getTrailColor() : '200,200,220';

      cannonBalls.forEach(ball => {
        if (!ball.trail || ball.trail.length < 2) return;
        const len = ball.trail.length;

        ctx.save();
        ctx.lineCap    = 'round';
        ctx.lineJoin   = 'round';
        ctx.globalCompositeOperation = 'lighter';

        // Draw 3 slightly offset strokes to replicate the multi-brush look
        const offsets = [
          { ox: 0,  oy: 0,  widthMult: 1.0, alphaMult: 1.0 },
          { ox: -3, oy: 2,  widthMult: 0.6, alphaMult: 0.5 },
          { ox: 3,  oy: -2, widthMult: 0.4, alphaMult: 0.35 },
        ];

        offsets.forEach(({ ox, oy, widthMult, alphaMult }) => {
          for (let i = 1; i < len; i++) {
            const t       = i / len;                      // 0 = oldest, 1 = newest
            const alpha   = t * 0.72 * alphaMult;
            const width   = t * BALL_RADIUS * 1.6 * widthMult;

            ctx.beginPath();
            ctx.globalAlpha = alpha;
            ctx.lineWidth   = Math.max(0.5, width);
            ctx.strokeStyle = `rgb(${rgb})`;

            ctx.moveTo(ball.trail[i - 1].x + ox, ball.trail[i - 1].y + oy);
            ctx.lineTo(ball.trail[i].x     + ox, ball.trail[i].y     + oy);
            ctx.stroke();
          }
        });

        ctx.restore();
      });
    }

    function drawCannonBalls() {
      if (!cannonBalls.length) return;
      ctx.save();

      // Use the player's selected ball skin; fall back to the default ammoImage.
      const _activeBallImg = (window.BallSkins ? window.BallSkins.getSelectedImg() : null) || ammoImage;

      cannonBalls.forEach((ball) => {
        ctx.globalAlpha = 1;
        if (_activeBallImg && _activeBallImg.complete && _activeBallImg.naturalWidth > 0) {
          ctx.drawImage(
            _activeBallImg,
            ball.x - CANNONBALL_DRAW_SIZE / 2,
            ball.y - CANNONBALL_DRAW_SIZE / 2,
            CANNONBALL_DRAW_SIZE,
            CANNONBALL_DRAW_SIZE
          );
        } else {
          ctx.fillStyle = "#f7f7f7";
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      ctx.restore();
    }

    function drawTrajectoryLine() {
      if (!getAimGuide()) return; // for on and off ng aim guide

      const start = getCannonTipPosition();
      const direction = {
        x: Math.cos(cannonAngle),
        y: Math.sin(cannonAngle)
      };

      const segments = computeTrajectorySegments(start, direction);
      if (!segments.length) return;

      ctx.save();
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.strokeStyle = "rgba(57, 255, 20, 1)";
      ctx.shadowColor = "rgba(255, 255, 255, 0.35)";
      ctx.shadowBlur = 6;

      ctx.beginPath();
      segments.forEach((segment) => {
        ctx.moveTo(segment.from.x, segment.from.y);
        ctx.lineTo(segment.to.x, segment.to.y);
      });
      ctx.stroke();
      ctx.restore();
    }

    function computeTrajectorySegments(start, direction) {
      const segments = [];
      const firstHit = traceRay(start, direction, TRAJECTORY_MAX_DISTANCE);
      segments.push({ from: start, to: firstHit.point });

      if (firstHit.type === "boundary" && firstHit.distance < TRAJECTORY_MAX_DISTANCE) {
        const remaining1 = TRAJECTORY_MAX_DISTANCE - firstHit.distance;
        if (remaining1 > 4) {
          // Bounce direction: reverse either x or y depending on which wall was hit
          const bounceDir1 = {
            x: (firstHit.side === "left" || firstHit.side === "right") ? -direction.x : direction.x,
            y: (firstHit.side === "top" || firstHit.side === "bottom") ? -direction.y : direction.y
          };
          const secondHit = traceRay(firstHit.point, bounceDir1, remaining1);
          segments.push({ from: firstHit.point, to: secondHit.point });

          if (secondHit.type === "boundary" && secondHit.distance < remaining1) {
            const remaining2 = remaining1 - secondHit.distance;
            if (remaining2 > 4) {
              const bounceDir2 = {
                x: (secondHit.side === "left" || secondHit.side === "right") ? -bounceDir1.x : bounceDir1.x,
                y: (secondHit.side === "top" || secondHit.side === "bottom") ? -bounceDir1.y : bounceDir1.y
              };
              const thirdHit = traceRay(secondHit.point, bounceDir2, remaining2);
              segments.push({ from: secondHit.point, to: thirdHit.point });
            }
          }
        }
      }

      return segments;
    }

    function traceRay(origin, direction, maxDistance) {
      const boundaryHit = traceBoundary(origin, direction, maxDistance);
      const blockHit = traceBlock(origin, direction, maxDistance);
      let best = boundaryHit;
      if (blockHit && blockHit.distance < best.distance) {
        best = blockHit;
      }

      const distance = Math.min(best.distance, maxDistance);
      return {
        ...best,
        distance,
        point: {
          x: origin.x + direction.x * distance,
          y: origin.y + direction.y * distance
        }
      };
    }

    // function traceRay(origin, direction, maxDistance) {
    //   const boundaryHit = traceBoundary(origin, direction, maxDistance);
    //   const distance = Math.min(boundaryHit.distance, maxDistance);
    //   return {
    //     ...boundaryHit,
    //     distance,
    //     point: {
    //       x: origin.x + direction.x * distance,
    //       y: origin.y + direction.y * distance
    //     }
    //   };
    // }

    function traceBoundary(origin, direction, maxDistance) {
      let best = { distance: maxDistance, type: "none", side: null };
      
      // Check top/bottom boundaries
      if (Math.abs(direction.y) > 0.0001) {
        const targetY = direction.y < 0 ? BALL_RADIUS : GAME_H - BALL_RADIUS;
        const t = (targetY - origin.y) / direction.y;
        if (t > 0.0001 && t < best.distance) {
          best = {
            distance: t,
            type: "boundary",
            side: direction.y < 0 ? "top" : "bottom"
          };
        }
      }
      
      // Check left/right boundaries (only if no top/bottom hit, or if closer)
      if (Math.abs(direction.x) > 0.0001) {
        const targetX = direction.x < 0 ? BALL_RADIUS : GAME_W - BALL_RADIUS;
        const t = (targetX - origin.x) / direction.x;
        if (t > 0.0001 && t < best.distance) {
          best = {
            distance: t,
            type: "boundary",
            side: direction.x < 0 ? "left" : "right"
          };
        }
      }
      
      return best;
    }

    function traceBlock(origin, direction, maxDistance) {
      let best = null;
      for (const block of letterBlocks) {
          if (block.isDestroyed || !block.isActive) continue;
          const t = rayRectIntersection(origin, direction, block);
        if (t === null || t < 0 || t > maxDistance) continue;
        if (!best || t < best.distance) {
          best = { distance: t, type: "block" };
        }
      }
      return best || { distance: maxDistance, type: "none" };
    }

    function rayRectIntersection(origin, direction, rect) {
      const expanded = {
        x: rect.x - BALL_RADIUS,
        y: rect.y - BALL_RADIUS,
        width: rect.width + BALL_RADIUS * 2,
        height: rect.height + BALL_RADIUS * 2
      };

      let tEntry = -Infinity;
      let tExit = Infinity;

      if (Math.abs(direction.x) < 0.0001) {
        if (origin.x < expanded.x || origin.x > expanded.x + expanded.width) {
          return null;
        }
      } else {
        const tx1 = (expanded.x - origin.x) / direction.x;
        const tx2 = (expanded.x + expanded.width - origin.x) / direction.x;
        const txMin = Math.min(tx1, tx2);
        const txMax = Math.max(tx1, tx2);
        tEntry = Math.max(tEntry, txMin);
        tExit = Math.min(tExit, txMax);
      }

      if (Math.abs(direction.y) < 0.0001) {
        if (origin.y < expanded.y || origin.y > expanded.y + expanded.height) {
          return null;
        }
      } else {
        const ty1 = (expanded.y - origin.y) / direction.y;
        const ty2 = (expanded.y + expanded.height - origin.y) / direction.y;
        const tyMin = Math.min(ty1, ty2);
        const tyMax = Math.max(ty1, ty2);
        tEntry = Math.max(tEntry, tyMin);
        tExit = Math.min(tExit, tyMax);
      }

      if (tExit >= Math.max(tEntry, 0)) {
        return Math.max(tEntry, 0);
      }

      return null;
    }

    function drawAmmoDisplay() {
      if (!window.TargetWord) return;
      const ammoState = window.TargetWord.state;
      if (!ammoState) return;
      const maxAmmo = ammoState.maxAmmo ?? 6;
      const currentAmmo = ammoState.ammo ?? maxAmmo;
      const ammoSize = 46;
      const gap = 2;
      const hudPadding = HUD_PADDING;
      const ammoPaddingX = Math.max(12, hudPadding + 120);
      const y = GAME_H - hudPadding - ammoSize + 50;

      // Use the player's selected ball skin; fall back to the default ammoImage.
      const _hudBallImg = (window.BallSkins ? window.BallSkins.getSelectedImg() : null) || ammoImage;

      for (let i = 0; i < maxAmmo; i++) {
        const x = ammoPaddingX + i * (ammoSize + gap);
        const isActive = i < currentAmmo;
        ctx.globalAlpha = isActive ? 1 : 0.25;
        if (_hudBallImg && _hudBallImg.complete && _hudBallImg.naturalWidth > 0) {
          ctx.drawImage(_hudBallImg, x, y, ammoSize, ammoSize);
        } else {
          ctx.fillStyle = "rgba(30, 30, 30, 0.9)";
          ctx.beginPath();
          ctx.arc(x + ammoSize / 2, y + ammoSize / 2, ammoSize / 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.globalAlpha = 1;

      const ammoLabel = `${currentAmmo}/${maxAmmo}`;
      const totalWidth = Math.max(0, maxAmmo * ammoSize + Math.max(0, maxAmmo - 1) * gap);
      const labelX = ammoPaddingX + totalWidth + 12;
      ctx.font = "bold 18px PixelFont";
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(ammoLabel, labelX, y + ammoSize / 2);
    }

        frameIndex * FRAME_W, 0, FRAME_W, FRAME_H,

    function drawComboMessage() {
      if (comboMessageTimer <= 0) return;
      const progress = comboMessageTimer / COMBO_MESSAGE_DURATION;
      const yOffset = (1 - progress) * -20;
      ctx.save();
      ctx.globalAlpha = progress;
      ctx.font = 'bold 22px PixelFont';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = comboCount >= 3 ? '#ff9f00' : '#7efc7f';
      ctx.shadowColor = comboCount >= 3 ? 'rgba(255,159,0,0.9)' : 'rgba(126,252,127,0.9)';
      ctx.shadowBlur = 12;
      ctx.fillText(comboMessage, GAME_W / 2, GAME_H / 2 - 60 + yOffset);
      ctx.restore();
    }

    function render() {

    function animate(ts) {
      const canProgress = !gameOver && !gamePaused && !roundCompleteActive;
      if (canProgress) {
        updateBackgroundMovement(ts);
      }
      if (!lastBlinkTime) lastBlinkTime = ts;

      const elapsed = ts - lastBlinkTime;

      if (blinkState === "open" && elapsed > nextBlinkDelay) {
        blinkFrame = 1;
        blinkState = "closed";
        lastBlinkTime = ts;
      } else if (blinkState === "closed" && elapsed > 130) {
        blinkFrame = 0;
        blinkState = "open";
        lastBlinkTime = ts;
        nextBlinkDelay = 1800 + Math.random() * 2200;
      }

      if (canProgress) {
        updateCannonBalls();
        updateTimer(ts);
        updateBlockAnimations();
        updateLetterHitEffects();
        updateFloatingPopups();
        updateFloatingHearts();
        spawnFloatingHeart(ts);
        if (roundMessageTimer > 0) {
          roundMessageTimer = Math.max(0, roundMessageTimer - 1);
        }
        if (comboMessageTimer > 0) comboMessageTimer--;
      }

      render();
      requestAnimationFrame(animate);
    }

    function getAngleFromMouse(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();

      const pivotX =
        rect.left +
        PLAYER_X +
        (MOUNT_X * SCALE) * PLAYER_SCALE;

      const pivotY =
        rect.top +
        PLAYER_Y +
        (MOUNT_Y * SCALE) * PLAYER_SCALE;

      let angle = Math.atan2(clientY - pivotY, clientX - pivotX);

      if (angle < MIN_ANGLE) angle = MIN_ANGLE;
      if (angle > MAX_ANGLE) angle = MAX_ANGLE;

      return angle;
    }

let _confettiParticles = [];
let _confettiCanvas    = null;
let _confettiCtx       = null;
let _confettiAnimId    = null;
const CONFETTI_COLORS  = [
  '#ff6b6b','#ffd700','#7efc7f',
  '#64b5f6','#ff9f00','#ff69b4','#c084fc','#ffffff'
];

function _initConfettiCanvas() {
  _confettiCanvas = document.getElementById('confettiCanvas');
  if (!_confettiCanvas) return;
  _confettiCanvas.width  = GAME_W;
  _confettiCanvas.height = GAME_H;
  _confettiCtx = _confettiCanvas.getContext('2d');
}

function _spawnConfetti() {
  _confettiParticles = [];
  for (let i = 0; i < 140; i++) {
    _confettiParticles.push({
      x:        Math.random() * GAME_W,
      y:        -10 - Math.random() * 120,
      vx:       (Math.random() - 0.5) * 3.2,
      vy:       1.8 + Math.random() * 2.8,
      color:    CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      size:     5 + Math.random() * 9,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.14,
      rect:     Math.random() > 0.45   // rect vs circle
    });
  }
}

function _updateConfetti() {
  _confettiParticles.forEach(p => {
    p.x        += p.vx;
    p.y        += p.vy;
    p.vy       += 0.04;           // gentle gravity
    p.rotation += p.rotSpeed;
    if (p.y > GAME_H + 20) {      // loop back to top
      p.y  = -10;
      p.x  = Math.random() * GAME_W;
      p.vy = 1.8 + Math.random() * 2.8;
    }
  });
}

function _drawConfetti() {
  if (!_confettiCtx) return;
  _confettiCtx.clearRect(0, 0, GAME_W, GAME_H);
  _confettiParticles.forEach(p => {
    _confettiCtx.save();
    _confettiCtx.fillStyle = p.color;
    _confettiCtx.translate(p.x, p.y);
    _confettiCtx.rotate(p.rotation);
    if (p.rect) {
      _confettiCtx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
    } else {
      _confettiCtx.beginPath();
      _confettiCtx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
      _confettiCtx.fill();
    }
    _confettiCtx.restore();
  });
}

function startConfetti() {
  if (!_confettiCanvas) _initConfettiCanvas();
  if (!_confettiCanvas) return;
  _confettiCanvas.style.display = 'block';
  _spawnConfetti();
  const loop = () => {
    _updateConfetti();
    _drawConfetti();
    _confettiAnimId = requestAnimationFrame(loop);
  };
  if (_confettiAnimId) cancelAnimationFrame(_confettiAnimId);
  _confettiAnimId = requestAnimationFrame(loop);
}

function stopConfetti() {
  if (_confettiAnimId) { cancelAnimationFrame(_confettiAnimId); _confettiAnimId = null; }
  if (_confettiCtx)    _confettiCtx.clearRect(0, 0, GAME_W, GAME_H);
  if (_confettiCanvas) _confettiCanvas.style.display = 'none';
  _confettiParticles = [];
}

    function trackImage(image, { critical = false, callback } = {}) {
      if (!image) return;
      const complete = () => {
        if (typeof callback === "function") callback();
        handleAssetCompletion(critical);

      if (image.complete) {
        complete();
        return;
      }
      image.addEventListener("load", complete, { once: true });
      image.addEventListener("error", complete, { once: true });
    }
