<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spell Shot</title>
  <style>
    @font-face {
      font-family: "PixelFont";
      src: url("assets/font/Pixel_Font.otf") format("opentype");
      font-weight: normal;
      font-style: normal;
    }

    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: "PixelFont", sans-serif;
      position: relative;
    }

    #gameShell {
      position: relative;
      width: 1035px;
      height: 596px;
    }

    #gameShell canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #pauseBackdrop {
      position: absolute;
      inset: 0;
      background: rgba(5, 5, 12, 0.75);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
      z-index: 14;
    }

    #pauseBackdrop.active {
      opacity: 1;
      pointer-events: auto;
    }

    #pauseOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
      z-index: 15;
    }

    #pauseOverlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    #pauseOverlay #pausePanel,
    #pauseOverlay .pause-option {
      pointer-events: none;
    }

    #pauseOverlay.active #pausePanel,
    #pauseOverlay.active .pause-option {
      pointer-events: auto;
    }

    .ui-btn {
      border: none;
      padding: 0;
      margin: 0;
      background: transparent;
      cursor: pointer;
      outline: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      pointer-events: auto;
      transform-origin: center center;
      will-change: transform, filter;
      transition: transform 0.10s cubic-bezier(.22,.61,.36,1), filter 0.10s ease;
      filter: drop-shadow(3px 4px 0px rgba(0, 0, 0, 0.55));
    }

    .ui-btn:hover {
      transform: scale(1.07) translateY(-3px);
      filter:
        brightness(1.22)
        drop-shadow(0 0 9px rgba(255, 210, 60, 0.90))
        drop-shadow(3px 4px 0px rgba(0, 0, 0, 0.55));
    }

    .ui-btn.pressing {
      transform: scale(0.91) translateY(3px) !important;
      filter:
        brightness(1.55)
        drop-shadow(0 0 16px rgba(255, 130, 0, 1))
        drop-shadow(2px 2px 0px rgba(0, 0, 0, 0.55)) !important;
      transition: transform 0.04s ease, filter 0.04s ease;
    }

    @keyframes btnRelease {
      0% { transform: scale(0.91) translateY(3px); }
      45% { transform: scale(1.13) translateY(-5px); }
      72% { transform: scale(0.97) translateY(0px); }
      100% { transform: scale(1.00) translateY(0px); }
    }

    .ui-btn.released {
      animation: btnRelease 0.32s cubic-bezier(.22,.61,.36,1) forwards;
    }

    .ui-btn img {
      display: block;
      width: 58px;
      height: 58px;
      image-rendering: pixelated;
    }

    #pausePanel {
      background: rgba(8, 8, 24, 0.95);
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.45);
      padding: 28px 32px;
      box-shadow: 0 18px 32px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      min-width: 320px;
    }

    .pause-panel-title {
      color: #fefefe;
      font-size: 62px;
      letter-spacing: 10px;
      text-transform: uppercase;
      font-family: "PixelFont", sans-serif;
      text-shadow: 0 0 16px rgba(255, 255, 255, 0.65);
    }

    .pause-icon-row {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .pause-option {
      width: 72px;
      height: 72px;
      padding: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      justify-content: center;
      align-items: center;
    }

    .pause-option img {
      width: 46px;
      height: 46px;
    }

    :root {
      --hud-padding: 60px;
    }

    .ui-btn.disabled {
      pointer-events: none;
      filter: grayscale(0.9) brightness(0.7);
    }

    #pauseUI {
      position: absolute;
      top: var(--hud-padding);
      right: 60px;
      z-index: 16;
      pointer-events: auto;
    }

    #pauseToggle {
      transform: scale(0.9);
      padding-top: 6px;
      padding-bottom: 6px;
    }

    #pauseToggle img {
      width: 48px;
      height: 48px;
    }

    #mapOverlay {
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;
    }

    #borderOverlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 13;
    }

    #borderOverlay img {
      position: absolute;
      display: block;
      image-rendering: pixelated;
      pointer-events: none;
      width: auto;
      height: auto;
    }

    /* timer overlay remains centered at top */

    #timerOverlay {
      position: absolute;
      top: -64px;
      left: 50%;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #timerOverlay img {
      display: block;
      image-rendering: pixelated;
      height: auto;
      width: auto;
    }

    #timerOverlayText {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: "PixelFont", sans-serif;
      font-size: 32px;
      letter-spacing: 2px;
      color: #ffef72;
      text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
      pointer-events: none;
    }

    #targetWordOverlay {
      position: absolute;
      top: calc(100% + 0.1rem);
      left: 50%;
      transform: translateX(-50%) translateY(-8px) scale(0.92);
      display: flex;
      gap: 0;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      font-family: "PixelFont", sans-serif;
      font-size: 26px;
      letter-spacing: 1.2px;
      color: #fefefe;
      opacity: 0;
      transition: opacity 0.1s ease, transform 0.1s ease, filter 0.25s ease;
    }

    #targetWordOverlay.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    #targetWordOverlay .target-letter {
      width: 48px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0.35;
      transform: none;
      transition: none;
      text-shadow: 0 0 6px rgba(0, 0, 0, 0.7);
    }

    #targetWordOverlay.visible .target-letter {
      opacity: 0.35;
    }

    #targetWordOverlay.visible .target-letter.active {
      opacity: 1;
    }

    #targetWordOverlay .target-letter img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }

    #targetWordOverlay .target-letter.fallback {
      font-size: 26px;
      letter-spacing: 1.2px;
    }

    #targetWordOverlay.dimmed {
      filter: brightness(0.45);
    }

    @keyframes timerPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1);    }
      50%       { transform: translate(-50%, -50%) scale(1.15); }
    }

    #timerOverlayText.urgent {
      animation: timerPulse 0.5s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div id="gameShell">
    <div id="borderOverlay">
      <img id="borderLeft" src="assets/map1/border/leftBorder.png" alt="Left border" />
      <img id="borderRight" src="assets/map1/border/rightBorder.png" alt="Right border" />
      <img id="borderBottom" src="assets/map1/border/bottomBorder.png" alt="Bottom border" />
    </div>
    <canvas id="c"></canvas>
    <div id="pauseBackdrop"></div>
    <div id="pauseOverlay">
    <div id="pausePanel">
        <div class="pause-panel-title">Paused</div>
        <div class="pause-icon-row">
          <button class="pause-option ui-btn" type="button" data-pause-action="resume" role="menuitem" aria-label="Resume gameplay">
            <img src="assets/resume.png" alt="Resume" />
          </button>
          <button class="pause-option ui-btn" type="button" data-pause-action="setting" role="menuitem" aria-label="Open settings">
            <img src="assets/setting.png" alt="Setting" />
          </button>
          <button class="pause-option ui-btn" type="button" data-pause-action="home" role="menuitem" aria-label="Go to home">
            <img src="assets/home.png" alt="Home" />
          </button>
        </div>
      </div>
    </div>
    <div id="pauseUI">
      <button id="pauseToggle" class="ui-btn" type="button" aria-label="Pause the game">
        <img src="assets/pause.png" alt="Pause" />
      </button>
    </div>
    <div id="mapOverlay">
      <div id="timerOverlay">
        <img id="timerOverlayImage" src="assets/map1/timerBox.png" alt="Timer Box" />
        <span id="timerOverlayText">1:00</span>
        <div id="targetWordOverlay"></div>
      </div>
    </div>
  </div>

  <script src="js/cannonSkins.js"></script>
  <script src="js/sfx.js"></script> 
  <script src="js/settings.js"></script>
  <script src="js/music.js"></script>
  <script src="js/pause.js"></script> 

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;


    ctx.font = "16px PixelFont";

    // --------------------------------------------------
    // IMPORTING FILES
    // --------------------------------------------------
    const bgImg = new Image();
    const mapBridgeImage = new Image();
    const imgBody = new Image();
    const imgCanon = new Image();
    const imgWheel = new Image();
    const coinImage = new Image();
    const heartImage = new Image();
    const ammoImage = new Image();
    const timerBoxImage = new Image();
    const timerOverlay = document.getElementById("timerOverlay");
    const timerOverlayImage = document.getElementById("timerOverlayImage");
    const timerOverlayText = document.getElementById("timerOverlayText");
    const targetWordOverlay = document.getElementById("targetWordOverlay");
    const borderLeftElem = document.getElementById("borderLeft");
    const borderRightElem = document.getElementById("borderRight");
    const borderBottomElem = document.getElementById("borderBottom");
    imgBody.src = "assets/girlySprite.png";
    imgCanon.src = "assets/canon.png";
    imgWheel.src = "assets/wheel.png";
    coinImage.src = "assets/coin.png";
    heartImage.src = "assets/lives.png";
    ammoImage.src = "assets/cannonBall.png";
    const floatingPopups = [];
    let overlayDirty = true;
    const overlayLetterSlots = [];
    let cachedOverlayWord = "";

    //sa timerbox ni map3 waley pa so ginamit ko na muna yung timerbox ni map1
    const THEMES = [
      {
        id: "map1",
        letterFolder: "assets/map1/letter",
        background: "assets/map1/background/background.png",
        bridge: "assets/map1/background/bridgeMap.png",
        timerBox: "assets/map1/timerBox.png",
        borders: {
          left: "assets/map1/border/leftBorder.png",
          right: "assets/map1/border/rightBorder.png",
          bottom: "assets/map1/border/bottomBorder.png"
        }
      },
      {
        id: "map2",
        letterFolder: "assets/map2/letter",
        background: "assets/map2/background/background.png",
        bridge: "assets/map2/background/bridge.png",
        timerBox: "assets/map2/timerBox.png",
        borders: {
          left: "assets/map2/border/leftBorder.png",
          right: "assets/map2/border/rightBorder.png",
          bottom: "assets/map2/border/bottomBorder.png"
        }
      },
      {
        id: "map3",
        letterFolder: "assets/map3/letter",
        background: "assets/map3/background/background.png",
        bridge: "assets/map3/background/bridge.png",
        timerBox: "assets/map1/timerBox.png",
        borders: {
          left: "assets/map3/border/leftBorder.png",
          right: "assets/map3/border/rightBorder.png",
          bottom: "assets/map3/border/bottomBorder.png"
        }
      }
    ];
    let currentThemeId = "";

    const DEFAULT_BORDER_DIMENSIONS = {
      left: { width: 0, height: 0 },
      right: { width: 0, height: 0 },
      bottom: { width: 0, height: 0 }
    };

    function preloadDefaultBorderDimensions() {
      const defaultBorders = THEMES[0]?.borders;
      if (!defaultBorders) return;
      Object.entries(defaultBorders).forEach(([key, src]) => {
        if (!src) return;
        const img = new Image();
        img.src = src;
        img.addEventListener(
          "load",
          () => {
            DEFAULT_BORDER_DIMENSIONS[key] = {
              width: img.naturalWidth,
              height: img.naturalHeight
            };
            updateBorderOverlayPositions();
          },
          { once: true }
        );
      });
    }

    preloadDefaultBorderDimensions();

    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const letterImages = {};
    for (let letter of alphabet) {
      letterImages[letter] = new Image();
    }

    function getThemeForRound(round) {
      const normalizedRound = Math.max(1, Number(round) || 1);
      const index = Math.min(Math.floor((normalizedRound - 1) / 5), THEMES.length - 1);
      return THEMES[index];
    }

    function setLetterSprites(folder) {
      if (!folder) return;
      alphabet.split("").forEach((letter) => {
        const sprite = letterImages[letter];
        if (sprite) {
          sprite.src = `${folder}/${letter}.png`;
        }
      });
    }

    function onImageReady(image, callback) {
      if (!image) return;
      const finalize = () => {
        if (typeof callback === "function") callback();
      };
      if (image.complete && image.naturalWidth > 0) {
        finalize();
        return;
      }
      image.addEventListener("load", finalize, { once: true });
      image.addEventListener("error", finalize, { once: true });
    }

    function setBorderImage(element, src) {
      if (!element || !src) return;
      element.src = src;
      onImageReady(element, updateBorderOverlayPositions);
    }

    function applyTheme(theme) {
      if (!theme || theme.id === currentThemeId) return;
      currentThemeId = theme.id;
      setLetterSprites(theme.letterFolder);
      bgImg.src = theme.background;
      mapBridgeImage.src = theme.bridge;
      const timerSrc = theme.timerBox || THEMES[0].timerBox;
      timerBoxImage.src = timerSrc;
      if (timerOverlayImage) {
        timerOverlayImage.src = timerSrc;
      }
      onImageReady(timerBoxImage, refreshTimerOverlay);
      setBorderImage(borderLeftElem, theme.borders.left);
      setBorderImage(borderRightElem, theme.borders.right);
      setBorderImage(borderBottomElem, theme.borders.bottom);
      markTargetWordDirty();
    }

    function updateThemeForRound(round) {
      const theme = getThemeForRound(round);
      applyTheme(theme);
    }

    // --------------------------------------------------
    // GAME CANVAS SIZE
    // --------------------------------------------------
    const GAME_W = 1035;
    const GAME_H = 596;

    // --------------------------------------------------
    // LETTER BLOCKS SYSTEM
    // --------------------------------------------------
    const letterBlocks = [];
    const LETTER_BLOCK_SIZE = 52;

    // --------------------------------------------------
    // GAME STATE
    // --------------------------------------------------
    let currentRound = 1;
    let currentWord = "LOADING";
    let wordProgress = [];
    const TIMER_DURATION_SECONDS = 60;
    const TIMER_BOX_SCALE = 0.105;
    const TIMER_BOX_TOP = -100;
    const BACKGROUND_SCROLL_SPEED = 0.012;
    const HUD_PADDING = (() => {
      const computed = getComputedStyle(document.documentElement).getPropertyValue("--hud-padding");
      const parsed = parseInt(computed, 10);
      return Number.isFinite(parsed) ? parsed : 60;
    })();
    const COIN_HIT_REWARD = 100;

    const BORDER_SCALE_MIN = 0.8;
    const BORDER_SCALE_MAX = 1.2;

    const BORDER_TOP_SCALE = .50;
    const BORDER_BOTTOM_SCALE = 0.85;

    const BORDER_TOP_LEFT_X = -50;
    const BORDER_TOP_LEFT_Y = -75;

    const BORDER_TOP_RIGHT_X = 50;
    const BORDER_TOP_RIGHT_Y = -75;

    const BORDER_BOTTOM_X = 0;
    const BORDER_BOTTOM_Y = 50;

    const SAVE_KEY = "spellshot-game-state-v1";
    const AUTO_SAVE_INTERVAL_MS = 2500;
    let autoSaveTimerId = null;
    let backgroundOffset = 0;
    let lastBackgroundTimestamp = 0;

    function buildSavePayload() {
      const targetState = window.TargetWord?.state;
      if (!targetState) return null;

      const maxLives = targetState.maxLives ?? 0;
      const maxAmmo = targetState.maxAmmo ?? 0;
      const rawLives = typeof targetState.lives === "number" ? targetState.lives : maxLives;
      const rawAmmo = typeof targetState.ammo === "number" ? targetState.ammo : maxAmmo;
      const clampedLives = Math.max(0, Math.min(maxLives, rawLives));
      const clampedAmmo = Math.max(0, Math.min(maxAmmo, rawAmmo));
      const savedLives = gameOver || clampedLives <= 0 ? maxLives : clampedLives;
      const savedAmmo = gameOver || clampedAmmo <= 0 ? maxAmmo : clampedAmmo;

      return {
        coins: typeof targetState.coins === "number" ? targetState.coins : 0,
        lives: savedLives,
        ammo: savedAmmo,
        currentTier: typeof targetState.currentTier === "number" ? targetState.currentTier : 1,
        wordsCompletedInTier: typeof targetState.wordsCompletedInTier === "number" ? targetState.wordsCompletedInTier : 0,
        totalWordsCompletedInTier: typeof targetState.totalWordsCompletedInTier === "number" ? targetState.totalWordsCompletedInTier : 0,
        currentWord: targetState.word,
        progress: Array.isArray(targetState.progress) ? targetState.progress : [],
        currentRound,
        timerRemaining,
        timerExpired
      };
    }

    function persistGameState() {
      try {
        const payload = buildSavePayload();
        if (!payload) return;
        localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
      } catch (error) {
        console.warn("SpellShot: Unable to persist game state", error);
      }
    }

    function loadSavedGameState() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : null;
      } catch (error) {
        console.warn("SpellShot: Unable to read saved game state", error);
        return null;
      }
    }

    function clearSavedGameState() {
      try {
        localStorage.removeItem(SAVE_KEY);
      } catch (error) {
        console.warn("SpellShot: Unable to clear saved game state", error);
      }
    }

    function startAutoSave() {
      if (autoSaveTimerId) return;
      autoSaveTimerId = setInterval(persistGameState, AUTO_SAVE_INTERVAL_MS);
    }

    function applySavedGameState(saved) {
      if (!saved || !window.TargetWord) return;
      const targetState = TargetWord.state;
      if (!targetState) return;

      if (saved.currentWord) {
        TargetWord.setTargetWord(saved.currentWord);
      }

      const wordLength = targetState.word ? targetState.word.length : 0;
      if (Array.isArray(saved.progress) && saved.progress.length === wordLength) {
        targetState.progress = saved.progress.map(Boolean);
      } else if (wordLength > 0) {
        targetState.progress = Array(wordLength).fill(false);
      }

      if (typeof saved.coins === "number") {
        targetState.coins = Math.max(0, saved.coins);
        targetState.sessionBaselineCoins = targetState.coins;
      }

      if (typeof saved.lives === "number") {
        const maxLives = targetState.maxLives ?? 0;
        const clampedLives = Math.max(0, Math.min(maxLives, saved.lives));
        targetState.lives = clampedLives > 0 ? clampedLives : maxLives;
      }

      if (typeof saved.ammo === "number") {
        const maxAmmo = targetState.maxAmmo ?? 0;
        const clampedAmmo = Math.max(0, Math.min(maxAmmo, saved.ammo));
        targetState.ammo = clampedAmmo > 0 ? clampedAmmo : maxAmmo;
      }

      if (typeof saved.currentTier === "number") {
        targetState.currentTier = Math.max(1, saved.currentTier);
      }

      if (typeof saved.wordsCompletedInTier === "number") {
        targetState.wordsCompletedInTier = Math.max(0, saved.wordsCompletedInTier);
      }

      if (typeof saved.totalWordsCompletedInTier === "number") {
        targetState.totalWordsCompletedInTier = Math.max(0, saved.totalWordsCompletedInTier);
      }

      if (typeof saved.currentRound === "number") {
        currentRound = Math.max(1, saved.currentRound);
      }

      if (typeof saved.timerRemaining === "number") {
        timerRemaining = Math.max(0, Math.min(TIMER_DURATION_SECONDS, saved.timerRemaining));
        timerExpired = false;
      }

      gameOver = false;
      gameOverReason = "";
      markTargetWordDirty();
      updateTimerOverlayText();
      updateThemeForRound(currentRound);
    }

    function updateBackgroundMovement(ts) {
      if (!ts) return;
      if (!lastBackgroundTimestamp) {
        lastBackgroundTimestamp = ts;
        return;
      }
      const delta = ts - lastBackgroundTimestamp;
      backgroundOffset = (backgroundOffset + delta * BACKGROUND_SCROLL_SPEED) % GAME_W;
      lastBackgroundTimestamp = ts;
    }

    function drawScrollingBackground() {
      if (!bgImg || !bgImg.complete) return;
      const drawWidth = GAME_W;
      const drawHeight = GAME_H;
      const offset = backgroundOffset % drawWidth;
      ctx.drawImage(bgImg, -offset, 0, drawWidth, drawHeight);
      ctx.drawImage(bgImg, -offset + drawWidth, 0, drawWidth, drawHeight);
    }

    function drawBridgeLayer() {
      if (!mapBridgeImage || !mapBridgeImage.complete) return;
      const scale = GAME_W / mapBridgeImage.naturalWidth;
      const bridgeHeight = mapBridgeImage.naturalHeight * scale;
      const y = Math.max(0, GAME_H - bridgeHeight + 12);
      ctx.drawImage(mapBridgeImage, 0, y, GAME_W, bridgeHeight);
    }

    let timerRemaining = TIMER_DURATION_SECONDS;
    let lastTimerTimestamp = null;
    let timerExpired = false;
    let gameOver = false;
    let gamePaused = false;
    let roundMessage = "";
    let roundMessageTimer = 0;
    const ROUND_MESSAGE_DURATION = 150;
    let gameOverReason = "";
    let timerBoxBounds = { x: 0, y: 0, width: 0, height: 0 };
    const TRAJECTORY_MAX_DISTANCE = 2200;
    const BALL_SPEED = 18;
    const BALL_RADIUS = 12;
    const BOUNCE_LIMIT = 1;
    const CANNONBALL_DRAW_SIZE = 34;
    const cannonBalls = [];
    const letterHitParticles = [];
    const SUCCESS_FLASH_DURATION = 14;
    const ROUND_HEADER_OFFSET = 18;
    let successFlash = { timer: 0, x: 0, y: 0 };

    const gameShell = document.getElementById("gameShell");

    function refreshTimerOverlay() {
      if (!timerBoxImage || !timerBoxImage.naturalWidth) return;
      const boxWidth = timerBoxImage.naturalWidth * TIMER_BOX_SCALE;
      const boxHeight = timerBoxImage.naturalHeight * TIMER_BOX_SCALE;
      const x = (GAME_W - boxWidth) / 2;
      const y = TIMER_BOX_TOP - boxHeight * 0.35;
      timerBoxBounds = {
        x,
        y: Math.max(0, y),
        width: boxWidth,
        height: boxHeight
      };

      if (timerOverlayImage) {
        timerOverlayImage.style.width = `${boxWidth}px`;
        timerOverlayImage.style.height = `${boxHeight}px`;
      }
    }

    function updateTimerOverlayText() {
      if (!timerOverlayText) return;
      timerOverlayText.textContent = getTimerLabel();
    }

    function markTargetWordDirty() {
      overlayDirty = true;
    }

    function createOverlayLetterSlot(letter) {
      const slot = document.createElement("div");
      slot.className = "target-letter";
      const value = String(letter ?? "").toUpperCase();
      const sprite = letterImages[value];
      if (sprite && sprite.src) {
        const img = document.createElement("img");
        img.src = sprite.src;
        img.alt = value;
        slot.appendChild(img);
      } else {
        slot.textContent = value || "?";
        slot.classList.add("fallback");
      }
      return { element: slot };
    }

    function updateTargetWordOverlay() {
      if (!targetWordOverlay || !window.TargetWord) return;
      const state = TargetWord.state;
      if (!state || !state.word) {
        targetWordOverlay.textContent = "";
        targetWordOverlay.classList.remove("visible");
        return;
      }

      const letters = state.word.split("");
      const progress = Array.isArray(state.progress) ? state.progress : [];

      if (state.word.toUpperCase() !== cachedOverlayWord || letters.length !== overlayLetterSlots.length) {
        overlayLetterSlots.length = 0;
        targetWordOverlay.textContent = "";
        letters.forEach((letter) => {
          const slot = createOverlayLetterSlot(letter);
          overlayLetterSlots.push(slot);
          targetWordOverlay.appendChild(slot.element);
        });
        cachedOverlayWord = state.word.toUpperCase();
      }

      overlayLetterSlots.forEach((slot, index) => {
        slot.element.classList.toggle("active", Boolean(progress[index]));
      });
      targetWordOverlay.classList.add("visible");
    }

    function clampBorderScale(value) {
      return Math.min(Math.max(value, BORDER_SCALE_MIN), BORDER_SCALE_MAX);
    }

    function getBorderDimensions(key, element) {
      const reference = DEFAULT_BORDER_DIMENSIONS[key];
      if (reference && reference.width > 0 && reference.height > 0) {
        return reference;
      }
      if (element && element.naturalWidth > 0) {
        return {
          width: element.naturalWidth,
          height: element.naturalHeight
        };
      }
      return { width: 0, height: 0 };
    }

    function updateBorderOverlayPositions() {
      const topScale = clampBorderScale(BORDER_TOP_SCALE);
      const bottomScale = clampBorderScale(BORDER_BOTTOM_SCALE);

      if (borderLeftElem) {
        const dims = getBorderDimensions("left", borderLeftElem);
        if (dims.width > 0 && dims.height > 0) {
          const width = dims.width * topScale;
          const height = dims.height * topScale;
          borderLeftElem.style.width = `${width}px`;
          borderLeftElem.style.height = `${height}px`;
          borderLeftElem.style.left = `${BORDER_TOP_LEFT_X}px`;
          borderLeftElem.style.top = `${BORDER_TOP_LEFT_Y}px`;
        }
      }

      if (borderRightElem) {
        const dims = getBorderDimensions("right", borderRightElem);
        if (dims.width > 0 && dims.height > 0) {
          const width = dims.width * topScale;
          const height = dims.height * topScale;
          const left = GAME_W - width + BORDER_TOP_RIGHT_X;
          borderRightElem.style.width = `${width}px`;
          borderRightElem.style.height = `${height}px`;
          borderRightElem.style.left = `${left}px`;
          borderRightElem.style.top = `${BORDER_TOP_RIGHT_Y}px`;
        }
      }

      if (borderBottomElem) {
        const dims = getBorderDimensions("bottom", borderBottomElem);
        if (dims.width > 0 && dims.height > 0) {
          const width = dims.width * bottomScale;
          const height = dims.height * bottomScale;
          const left = (GAME_W - width) / 2 + BORDER_BOTTOM_X;
          const top = GAME_H - height + BORDER_BOTTOM_Y;
          borderBottomElem.style.width = `${width}px`;
          borderBottomElem.style.height = `${height}px`;
          borderBottomElem.style.left = `${left}px`;
          borderBottomElem.style.top = `${top}px`;
        }
      }
    }

    function spawnHitPopup(block, coinDelta) {
      if (!block || !coinDelta) return;
      const isPositive = coinDelta > 0;
      floatingPopups.push({
        x: block.x + block.width - 4,
        y: block.y - 8,
        text: `${isPositive ? "+" : "-"}${Math.abs(coinDelta)}`,
        color: isPositive ? "#ffe066" : "#ff6a6a",
        life: 48,
        vy: -0.45,
        alpha: 1
      });
    }

    function updateFloatingPopups() {
      for (let i = floatingPopups.length - 1; i >= 0; i--) {
        const popup = floatingPopups[i];
        popup.y += popup.vy;
        popup.life--;
        popup.alpha = Math.max(0, popup.life / 48);
        if (popup.life <= 0) {
          floatingPopups.splice(i, 1);
        }
      }
    }

    function drawFloatingPopups() {
      if (!floatingPopups.length) return;
      ctx.save();
      ctx.font = "bold 26px PixelFont";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      floatingPopups.forEach((popup) => {
        ctx.globalAlpha = popup.alpha;
        ctx.fillStyle = popup.color;
        ctx.shadowColor = "rgba(0, 0, 0, 0.65)";
        ctx.shadowBlur = 6;
        ctx.fillText(popup.text, popup.x, popup.y);
      });
      ctx.restore();
    }

    function onWordCompleted() {
      updateThemeForRound(currentRound);
      const tierComplete = TargetWord.completeWord();
      
      if (tierComplete) {
        TargetWord.advanceToNextTier();
      } else {
        TargetWord.loadNextWordInTier();
      }
      
      currentWord = TargetWord.state.word;
      markTargetWordDirty();
      resetTimerForRound();
      cannonBalls.length = 0;
      generateLetterBlocks();
    }

    function resetTimerForRound() {
      timerRemaining = TIMER_DURATION_SECONDS;
      lastTimerTimestamp = null;
      timerExpired = false;
      timerOverlayText?.classList.remove('urgent');
      if (timerOverlayText) timerOverlayText.style.color = '#ffef72';
      updateTimerOverlayText();
    }

    function handleTimerExpiry() {
      if (timerExpired) return;
      timerExpired = true;
      if (typeof checkGameOverConditions === "function") {
        checkGameOverConditions();
      } else {
        gameOver = true;
      }
    }


    function updateTimer(ts) {
      if (timerExpired || timerRemaining <= 0) return;
      if (!lastTimerTimestamp) {
        lastTimerTimestamp = ts;
        return;
      }

      const deltaSeconds = (ts - lastTimerTimestamp) / 1000;
      lastTimerTimestamp = ts;
      timerRemaining = Math.max(0, timerRemaining - deltaSeconds);

      if (timerRemaining <= 10 && timerRemaining > 0) {
        startTickingSfx();
        timerOverlayText?.classList.add('urgent');
        if (timerOverlayText) timerOverlayText.style.color = '#ff4f4f';
      } else {
        timerOverlayText?.classList.remove('urgent');
        if (timerOverlayText) timerOverlayText.style.color = '#ffef72';
      }

      if (timerRemaining <= 0) {
        timerRemaining = 0;
        stopTickingSfx();
        handleTimerExpiry();
      }

      updateTimerOverlayText();
    }

    function getTimerLabel() {
      const displaySeconds = Math.max(0, Math.ceil(timerRemaining));
      const minutes = Math.floor(displaySeconds / 60);
      const seconds = displaySeconds % 60;
      if (minutes > 0) {
        return `${minutes}:${seconds.toString().padStart(2, "0")}`;
      }
      return `${seconds}`;
    }

    // --------------------------------------------------
    // ORIGINAL CHARACTER SETTINGS (KEEP THESE)
    // --------------------------------------------------
    const FRAMES = 2;
    const SCALE = 0.55;

    let FRAME_W = 0;
    let FRAME_H = 0;

    // --------------------------------------------------
    // WHOLE PLAYER SCALE + POSITION
    // ito lang ang gamitin para lumiit at gumalaw ang player, wag na galawin yung original settings sa taas
    // --------------------------------------------------
    const PLAYER_SCALE = 0.15;
    const PLAYER_X = 60;
    const PLAYER_Y = 480;

    // --------------------------------------------------
    // CANNON SETTINGS (KEEP SAME)
    // --------------------------------------------------
    const MOUNT_X = 500;
    const MOUNT_Y = 770;

    const CANON_PIVOT_X = 100;
    const CANON_PIVOT_Y = 410;

    const CANON_SCALE = 0.38;

    let cannonAngle = 0;
    const MIN_ANGLE = -Math.PI * 0.35;
    const MAX_ANGLE = Math.PI * 0.35;
    let isDragging = false;

    // blink
    let blinkFrame = 0;
    let blinkState = "open";
    let lastBlinkTime = 0;
    let nextBlinkDelay = 1800 + Math.random() * 2000;

    // --------------------------------------------------
    // HELPERS
    // --------------------------------------------------
    const WHEEL_SCALE = 1.18;

    // LETTER BOX GENERATOR
    function generateLetterBlocks() {
      letterBlocks.length = 0;
      const wordLetters = [...currentWord];
      const uniqueLettersInWord = [...new Set(wordLetters)];

      const distractors = [];
      // number of text generator
      const maxDistractors = Math.min(4, 26 - uniqueLettersInWord.length); 
      while (distractors.length < maxDistractors) {
        let letter = alphabet[Math.floor(Math.random() * alphabet.length)];
        if (!uniqueLettersInWord.includes(letter) && !distractors.includes(letter)) {
          distractors.push(letter);
        }
      }

      const allLetters = [...wordLetters, ...distractors];

      const pivotY = PLAYER_Y + (MOUNT_Y * SCALE) * PLAYER_SCALE;
      const marginAboveCannon = 60;
      const defaultMinY = 100; 
      const defaultMaxY = GAME_H - 120;

      let computedMaxY = Math.min(defaultMaxY, Math.floor(pivotY - marginAboveCannon));
      if (computedMaxY < defaultMinY + LETTER_BLOCK_SIZE) {
        computedMaxY = Math.max(defaultMinY + LETTER_BLOCK_SIZE, defaultMaxY);
      }

      const bandHeight = 100; 
      const bandMinY = Math.max(defaultMinY, computedMaxY - bandHeight);
      const bandMaxY = computedMaxY;

      const safeZone = {
        minX: 320,
        maxX: GAME_W - 160,
        minY: bandMinY,
        maxY: bandMaxY
      };

      const minDistance = LETTER_BLOCK_SIZE + 20; 
      const positions = [];

      const maxAttempts = Math.max(allLetters.length * 25, 80);
      for (let attempt = 0; attempt < maxAttempts && positions.length < allLetters.length; attempt++) {
        const x = safeZone.minX + Math.random() * (safeZone.maxX - safeZone.minX);
        const y = safeZone.minY + Math.random() * (safeZone.maxY - safeZone.minY);

        let collides = false;
        for (let pos of positions) {
          const dx = x - pos.x;
          const dy = y - pos.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < minDistance) {
            collides = true;
            break;
          }
        }

        if (!collides) positions.push({ x, y });
      }

      if (positions.length < allLetters.length) {
        const extraNeeded = allLetters.length - positions.length;
        for (let i = 0; i < extraNeeded; i++) {
          const x = safeZone.minX + Math.random() * (safeZone.maxX - safeZone.minX);
          const y = Math.max(defaultMinY, Math.min(bandMaxY, bandMinY + Math.random() * bandHeight));
          positions.push({ x, y });
        }
      }

      allLetters.forEach((letter, index) => {
        if (index < positions.length) {
          const pos = positions[index];
        letterBlocks.push({
          x: pos.x,
          y: pos.y,
          width: LETTER_BLOCK_SIZE,
          height: LETTER_BLOCK_SIZE,
          letter,
          isCorrect: currentWord.includes(letter),
          wordIndex: index < wordLetters.length ? index : -1,
          flashTime: 0,
          isDestroyed: false,
          shakeTimer: 0,
          color: "#FFD700",
          isActive: true,
          cooldownTimer: 0,
          animationQueued: null,
          animationState: null,
          fallVelocity: 0,
          vx: 0,
          opacity: 1,
          jumpTimer: 0,
          jumpDuration: 0,
          jumpHeight: 0,
          jumpOffset: 0,
          wrongFlash: 0
        });
        }
      });

      ensureAllLettersAimable();
    }

    function ensureAllLettersAimable() {
      const minDistance = LETTER_BLOCK_SIZE + 30;
      
      letterBlocks.forEach((block, blockIndex) => {
        let colliding = true;
        let attempts = 0;
        
        while (colliding && attempts < 50) {
          colliding = false;
          
          for (let i = 0; i < letterBlocks.length; i++) {
            if (i === blockIndex) continue;
            
            const other = letterBlocks[i];
            const dx = block.x - other.x;
            const dy = block.y - other.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < minDistance) {
              colliding = true;
              break;
            }
          }
          
          if (colliding) {
            block.x = 300 + Math.random() * (GAME_W - 450);
            block.y = 100 + Math.random() * (GAME_H - 250);
            attempts++;
          }
        }
      });
    }

    function ensureWordLettersAccessible() {
      const cannonX = PLAYER_X + (MOUNT_X * SCALE) * PLAYER_SCALE;
      const cannonY = PLAYER_Y + (MOUNT_Y * SCALE) * PLAYER_SCALE;
      
      letterBlocks.forEach(block => {
        if (block.wordIndex < 0) return;
        
        let isBlocked = true;
        let attempts = 0;
        
        while (isBlocked && attempts < 10) {
          isBlocked = false;
          
          const dx = block.x + block.width/2 - cannonX;
          const dy = block.y + block.height/2 - cannonY;
          const distance = Math.sqrt(dx*dx + dy*dy);
          const steps = Math.floor(distance / 10);
          
          for (let i = 1; i < steps; i++) {
            const checkX = cannonX + (dx * i / steps);
            const checkY = cannonY + (dy * i / steps);
            
            for (let otherBlock of letterBlocks) {
              if (otherBlock === block) continue;
              
              const closestX = Math.max(otherBlock.x, Math.min(checkX, otherBlock.x + otherBlock.width));
              const closestY = Math.max(otherBlock.y, Math.min(checkY, otherBlock.y + otherBlock.height));
              
              const distanceX = checkX - closestX;
              const distanceY = checkY - closestY;
              const distanceSquared = distanceX * distanceX + distanceY * distanceY;
              
              if (distanceSquared <= BALL_RADIUS * BALL_RADIUS) {
                isBlocked = true;
                break;
              }
            }
            
            if (isBlocked) break;
          }
          
          if (isBlocked) {
            block.x = 300 + Math.random() * (GAME_W - 450);
            block.y = 100 + Math.random() * (GAME_H - 250);
            attempts++;
          }
        }
      });
    }

    function spawnLetterHitParticles(x, y) {
      const burstColor = "#ffe06a";
      const sparkleCount = 26;
      for (let i = 0; i < sparkleCount; i++) {
        const angle = (Math.PI * 2 * i) / sparkleCount + (Math.random() - 0.5) * 0.3;
        const speed = 2 + Math.random() * 6;
        letterHitParticles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: 0.018 + Math.random() * 0.022,
          radius: 2 + Math.random() * 3,
          color: burstColor,
          star: i % 3 === 0
        });
      }
    }

    function triggerLetterSuccessFlash(x, y) {
      successFlash = {
        timer: SUCCESS_FLASH_DURATION,
        x,
        y
      };
      spawnLetterHitParticles(x, y);
    }

    function updateLetterHitEffects() {
      for (let i = letterHitParticles.length - 1; i >= 0; i--) {
        const p = letterHitParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        p.vy += 0.08;
        p.vx *= 0.95;
        if (p.life <= 0) letterHitParticles.splice(i, 1);
      }
      if (successFlash.timer > 0) successFlash.timer--;
    }

    function drawLetterHitParticles() {
      if (!letterHitParticles.length) return;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      letterHitParticles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life);
        if (p.star) {
          ctx.strokeStyle = p.color;
          ctx.lineWidth = 2;
          const size = p.radius * Math.max(1, p.life);
          ctx.beginPath();
          ctx.moveTo(p.x - size, p.y);
          ctx.lineTo(p.x + size, p.y);
          ctx.moveTo(p.x, p.y - size);
          ctx.lineTo(p.x, p.y + size);
          const diag = size * 0.65;
          ctx.moveTo(p.x - diag, p.y - diag);
          ctx.lineTo(p.x + diag, p.y + diag);
          ctx.moveTo(p.x + diag, p.y - diag);
          ctx.lineTo(p.x - diag, p.y + diag);
          ctx.stroke();
        } else {
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, Math.max(1, p.radius * p.life), 0, Math.PI * 2);
          ctx.fill();
        }
      });
      ctx.restore();
    }

    function drawLetterSuccessFlash() {
      if (successFlash.timer <= 0) return;
      const progress = successFlash.timer / SUCCESS_FLASH_DURATION;
      const radius = 160 * (1 - progress);
      const alpha = 0.35 * progress;
      const grad = ctx.createRadialGradient(
        successFlash.x,
        successFlash.y,
        0,
        successFlash.x,
        successFlash.y,
        radius
      );
      grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
      grad.addColorStop(1, "rgba(255,255,255,0)");
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.fillStyle = grad;
      ctx.fillRect(
        successFlash.x - radius,
        successFlash.y - radius,
        radius * 2,
        radius * 2
      );
      ctx.restore();
    }

    function drawLetterBlocks() {
      letterBlocks.forEach(block => {
        if (block.isDestroyed) return;

        ctx.save();

        let shakeX = 0;
        let shakeY = 0;
        if (block.shakeTimer > 0) {
          const shakeIntensity = Math.min(block.shakeTimer / 10, 1) * 5;
          shakeX = (Math.random() - 0.5) * shakeIntensity;
          shakeY = (Math.random() - 0.5) * shakeIntensity;
          block.shakeTimer = Math.max(0, block.shakeTimer - 1);
        }

        let drawX = block.x + shakeX;
        let drawY = block.y + shakeY;
        if (block.animationState === "jumping") {
          drawY -= block.jumpOffset || 0;
        }

        let alpha = block.opacity ?? 1;
        let flashOverlay = false;
        if (block.flashTime > 0) {
          block.flashTime = Math.max(0, block.flashTime - 16);
          const currentTime = Date.now();
          const flashIntensity = Math.sin(currentTime * 0.02) * 0.5 + 0.5;
          const flashAlpha = 0.5 + flashIntensity * 0.5;
          alpha *= flashAlpha;
          flashOverlay = true;
        }

        ctx.globalAlpha = alpha;

        const letterImg = letterImages[block.letter];
        if (letterImg && letterImg.complete && letterImg.naturalWidth > 0) {
          ctx.drawImage(
            letterImg,
            drawX, drawY, block.width, block.height
          );
        } else {
          ctx.fillStyle = "white";
          ctx.font = "bold 40px PixelFont";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(
            block.letter,
            drawX + block.width / 2,
            drawY + block.height / 2
          );
        }

        if (flashOverlay) {
          ctx.globalAlpha = 0.6;
          ctx.fillStyle = block.color;
          ctx.fillRect(drawX, drawY, block.width, block.height);
        }

        if (block.wrongFlash > 0) {
          ctx.save();
          ctx.globalAlpha = Math.min(block.wrongFlash / 18, 1) * 0.65;
          ctx.fillStyle = "rgba(220, 28, 28, 1)";
          ctx.fillRect(drawX, drawY, block.width, block.height);
          ctx.restore();
        }

        ctx.restore();
      });
    }

    function hasRemainingLetter(letter) {
      if (!window.TargetWord) return false;
      const state = TargetWord.state;
      if (!state || !state.word) return false;
      for (let i = 0; i < state.word.length; i++) {
        if (!state.progress[i] && state.word[i] === letter) {
          return true;
        }
      }
      return false;
    }

    function queueBlockAnimation(block, type = null, shakeDuration = 18) {
      block.shakeTimer = shakeDuration;
      block.animationQueued = type;
      block.animationState = null;
      block.jumpOffset = 0;
      block.jumpTimer = 0;
      block.cooldownTimer = type === null ? shakeDuration : 0;
      block.isActive = false;
    }

    function startQueuedAnimation(block) {
      if (!block.animationQueued || block.animationState) return;
      if (block.animationQueued === "fall") {
        block.animationState = "falling";
        block.fallVelocity = -1.5;
        block.vx = (Math.random() - 0.5) * 3;
        block.opacity = 1;
      } else if (block.animationQueued === "jump") {
        block.animationState = "jumping";
        block.jumpTimer = 0;
        block.jumpDuration = 26;
        block.jumpHeight = 34;
        block.jumpOffset = 0;
      }
      block.animationQueued = null;
    }

    function updateBlockAnimations() {
      letterBlocks.forEach(block => {
        if (block.wrongFlash > 0) {
          block.wrongFlash = Math.max(0, block.wrongFlash - 1);
        }
        if (block.cooldownTimer > 0) {
          block.cooldownTimer--;
          if (block.cooldownTimer <= 0 && !block.animationState && !block.isDestroyed) {
            block.isActive = true;
          }
        }

        if (block.animationQueued && block.shakeTimer <= 0) {
          startQueuedAnimation(block);
        }

        if (block.animationState === "falling") {
          block.fallVelocity += 0.3;
          block.y += block.fallVelocity;
          block.x += block.vx;
          block.opacity = Math.max(0, block.opacity - 0.02);
          if (block.y > GAME_H + 80 || block.opacity <= 0) {
            block.isDestroyed = true;
          }
        }

        if (block.animationState === "jumping") {
          block.jumpTimer++;
          const progress = Math.min(block.jumpTimer / block.jumpDuration, 1);
          block.jumpOffset = Math.sin(progress * Math.PI) * block.jumpHeight;
          if (progress >= 1) {
            block.isDestroyed = true;
          }
        }
      });
    }

    function processBlockHit(block) {
      if (gameOver || !block.isActive || block.isDestroyed || !window.TargetWord) return;
      const state = TargetWord.state;
      if (!state) return;

      block.isActive = false;

      const nextIndex = state.progress.findIndex(flag => !flag);
      const nextLetter = nextIndex >= 0 ? state.word[nextIndex] : null;
      if (nextLetter && block.letter === nextLetter) {
        playHitSfx();
        const wordFinished = TargetWord.onLetterHit(block.letter, true);
        spawnHitPopup(block, COIN_HIT_REWARD);
        markTargetWordDirty();
        triggerLetterSuccessFlash(
          block.x + block.width / 2,
          block.y + block.height / 2
        );
        queueBlockAnimation(block, "jump", 22);
        if (wordFinished) {
          showRoundCompletedBanner();
          onWordCompleted();
        }
      } else if (hasRemainingLetter(block.letter)) {
        TargetWord.onLetterHit(block.letter, false);
        markTargetWordDirty();
        queueBlockAnimation(block, null, 20);
      } else {
        TargetWord.onLetterHit(block.letter, false);
        markTargetWordDirty();
        block.wrongFlash = 24;
        queueBlockAnimation(block, "fall", 18);
      }
      checkGameOverForPlayer();
    }

    function handleMissedShot() {
      if (gameOver) return;
      if (window.TargetWord && typeof TargetWord.recordMiss === "function") {
        TargetWord.recordMiss();
        checkGameOverForPlayer();
      }
    }

    function checkGameOverForPlayer() {
      if (gameOver) return;
      if (!window.TargetWord) return;
      const state = TargetWord.state;
      if (!state) return;
      if (state.lives <= 0) {
        handleGameOver("lives");
        return;
      }
      if (state.ammo <= 0) {
        handleGameOver("ammo");
        return;
      }
    }

    function handleGameOver(reason) {
      initPause();
      if (gameOver) return;
      gameOver = true;
      if (typeof bgMusic !== 'undefined') bgMusic.pause();
      playGameOverSfx();
      stopTickingSfx();
      gameOverReason = reason || "";
      timerExpired = true;
      roundMessageTimer = 0;
      if (window.TargetWord && typeof window.TargetWord.resetDisplayedCoins === "function") {
        window.TargetWord.resetDisplayedCoins();
      }
      updateThemeForRound(currentRound);
    }

    function getGameOverReasonText(reason) {
      switch (reason) {
        case "timer":
          return "Time ran out";
        case "ammo":
          return "Ammo depleted";
        case "lives":
          return "No lives remaining";
        default:
          return "You Lose!";
      }
    }

    function showRoundCompletedBanner() {
      roundMessage = `Level ${currentRound} Complete`;
      roundMessageTimer = ROUND_MESSAGE_DURATION;
      currentRound++;
      persistGameState();
    }

    function drawRoundBanner() {
      if (roundMessageTimer <= 0) return;
      const targetX =
        timerBoxBounds.width > 0 ? timerBoxBounds.x + timerBoxBounds.width / 2 : GAME_W / 2;
      const targetY =
        timerBoxBounds.height > 0
          ? timerBoxBounds.y + timerBoxBounds.height + ROUND_HEADER_OFFSET
          : 110;
      ctx.save();
      ctx.font = "bold 28px PixelFont";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#7efc7f";
      ctx.shadowColor = "rgba(126, 252, 127, 0.8)";
      ctx.shadowBlur = 10;
      ctx.fillText(roundMessage, targetX, targetY);
      ctx.restore();
    }

    function drawGameOverOverlay() {
      if (!gameOver) return;
      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, 0.72)";
      ctx.fillRect(0, 0, GAME_W, GAME_H);
      ctx.textBaseline = "middle";

      ctx.font = "bold 68px PixelFont";
      ctx.fillStyle = "#ff4f4f";
      ctx.shadowColor = "rgba(255, 79, 79, 0.85)";
      ctx.shadowBlur = 16;
      const title = "GAME OVER";
      const letterSpacing = 14;
      const letters = title.split("");
      const letterWidths = letters.map((ltr) => ctx.measureText(ltr).width);
      const totalWidth =
        letterWidths.reduce((sum, width) => sum + width, 0) + letterSpacing * (letters.length - 1);
      let cursorX = GAME_W / 2 - totalWidth / 2;
      const titleY = GAME_H / 2 - 60;
      for (let i = 0; i < letters.length; i++) {
        if (letters[i] === " ") {
          cursorX += letterWidths[i] + letterSpacing;
          continue;
        }
        ctx.fillText(letters[i], cursorX, titleY);
        cursorX += letterWidths[i] + letterSpacing;
      }

      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;

      ctx.font = "28px PixelFont";
      ctx.fillStyle = "#f8f7f0";
      ctx.textAlign = "center";
      ctx.fillText(getGameOverReasonText(gameOverReason), GAME_W / 2, GAME_H / 2 + 10);

      ctx.font = "22px PixelFont";
      const restartText = "Press R to restart";
      const restartWidth = ctx.measureText(restartText).width;
      const restartX = GAME_W / 2 - restartWidth / 2;
      const restartY = GAME_H / 2 + 70;
      const before = "Press ";
      const after = " to restart";
      const beforeWidth = ctx.measureText(before).width;
      ctx.textAlign = "left";
      ctx.fillStyle = "#ffffff";
      ctx.fillText(before, restartX, restartY);
      ctx.fillStyle = "#7bf55d";
      ctx.fillText("R", restartX + beforeWidth, restartY);
      const rWidth = ctx.measureText("R").width;
      ctx.fillStyle = "#ffffff";
      ctx.fillText(after, restartX + beforeWidth + rWidth, restartY);
      ctx.restore();
    }

    function restartGame() {
      if (!window.TargetWord) return;
      stopTickingSfx();
      initPause();
      if (typeof bgMusic !== 'undefined') bgMusic.play().catch(() => {});
      TargetWord.resetGameProgress();
      currentWord = TargetWord.state.word;
      cannonBalls.length = 0;
      roundMessage = "";
      roundMessageTimer = 0;
      currentRound = 1;
      updateThemeForRound(currentRound);
      gameOverReason = "";
      gameOver = false;
      timerExpired = false;
      resetTimerForRound();
      generateLetterBlocks();
      persistGameState();
    }

    function checkGameOverConditions() {
      handleGameOver("timer");
    }

    function getCannonPivotPosition() {
      const pivotX = PLAYER_X + (MOUNT_X * SCALE) * PLAYER_SCALE;
      const pivotY = PLAYER_Y + (MOUNT_Y * SCALE) * PLAYER_SCALE;
      return { x: pivotX, y: pivotY };
    }

    function getCannonTipPosition() {
      const pivot = getCannonPivotPosition();
      const rawLength = Math.max(120, (imgCanon.naturalWidth || 220) - CANON_PIVOT_X);
      const scaledLength = rawLength * CANON_SCALE * PLAYER_SCALE;
      return {
        x: pivot.x + Math.cos(cannonAngle) * scaledLength,
        y: pivot.y + Math.sin(cannonAngle) * scaledLength
      };
    }

    function fireCannon() {
      if (gameOver || gamePaused) return;
      const ammoState = window.TargetWord?.state;
      if (ammoState && ammoState.ammo <= 0) return;

      playFireSfx();

      const tip = getCannonTipPosition();
      const direction = {
        x: Math.cos(cannonAngle),
        y: Math.sin(cannonAngle)
      };

      cannonBalls.push({
        x: tip.x,
        y: tip.y,
        vx: direction.x * BALL_SPEED,
        vy: direction.y * BALL_SPEED,
        bounced: 0
      });
    }

    function updateCannonBalls() {
      if (!cannonBalls.length) return;
      const preserved = [];

      for (const ball of cannonBalls) {
        ball.x += ball.vx;
        ball.y += ball.vy;

        if (ball.bounced < BOUNCE_LIMIT) {
          if (ball.y <= BALL_RADIUS && ball.vy < 0) {
            ball.vy *= -1;
            ball.bounced++;
          } else if (ball.y >= GAME_H - BALL_RADIUS && ball.vy > 0) {
            ball.vy *= -1;
            ball.bounced++;
          }
        }

        const hitBlock = letterBlocks.find((block) => {
          if (!block.isActive || block.isDestroyed) return false;
          return (
            ball.x + BALL_RADIUS >= block.x &&
            ball.x - BALL_RADIUS <= block.x + block.width &&
            ball.y + BALL_RADIUS >= block.y &&
            ball.y - BALL_RADIUS <= block.y + block.height
          );
        });

        const isOutOfBounds =
          ball.x < -BALL_RADIUS * 2 ||
          ball.x > GAME_W + BALL_RADIUS * 2 ||
          ball.y < -BALL_RADIUS * 2 ||
          ball.y > GAME_H + BALL_RADIUS * 2;

        if (hitBlock) {
          processBlockHit(hitBlock);
          continue;
        }
        if (isOutOfBounds) {
          handleMissedShot();
          continue;
        }

        preserved.push(ball);
      }

      cannonBalls.length = 0;
      cannonBalls.push(...preserved);
    }

    function drawCannonBalls() {
      if (!cannonBalls.length) return;
      ctx.save();

      // Use the player's selected ball skin; fall back to the default ammoImage.
      const _activeBallImg = (window.BallSkins ? window.BallSkins.getSelectedImg() : null) || ammoImage;

      cannonBalls.forEach((ball) => {
        ctx.globalAlpha = 1;
        if (_activeBallImg && _activeBallImg.complete && _activeBallImg.naturalWidth > 0) {
          ctx.drawImage(
            _activeBallImg,
            ball.x - CANNONBALL_DRAW_SIZE / 2,
            ball.y - CANNONBALL_DRAW_SIZE / 2,
            CANNONBALL_DRAW_SIZE,
            CANNONBALL_DRAW_SIZE
          );
        } else {
          ctx.fillStyle = "#f7f7f7";
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      ctx.restore();
    }

    function drawTrajectoryLine() {
      if (!getAimGuide()) return; // for on and off ng aim guide

      const start = getCannonTipPosition();
      const direction = {
        x: Math.cos(cannonAngle),
        y: Math.sin(cannonAngle)
      };

      const segments = computeTrajectorySegments(start, direction);
      if (!segments.length) return;

      ctx.save();
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.strokeStyle = "rgba(255, 255, 255, 0.7)";
      ctx.shadowColor = "rgba(255, 255, 255, 0.35)";
      ctx.shadowBlur = 6;

      ctx.beginPath();
      segments.forEach((segment) => {
        ctx.moveTo(segment.from.x, segment.from.y);
        ctx.lineTo(segment.to.x, segment.to.y);
      });
      ctx.stroke();
      ctx.restore();
    }

    function computeTrajectorySegments(start, direction) {
      const segments = [];
      const firstHit = traceRay(start, direction, TRAJECTORY_MAX_DISTANCE);
      segments.push({ from: start, to: firstHit.point });

      if (firstHit.type === "boundary" && firstHit.distance < TRAJECTORY_MAX_DISTANCE) {
        const remaining = TRAJECTORY_MAX_DISTANCE - firstHit.distance;
        if (remaining > 4) {
          const bounceDir = { x: direction.x, y: -direction.y };
          const secondHit = traceRay(firstHit.point, bounceDir, remaining);
          segments.push({ from: firstHit.point, to: secondHit.point });
        }
      }

      return segments;
    }

    function traceRay(origin, direction, maxDistance) {
      const boundaryHit = traceBoundary(origin, direction, maxDistance);
      const blockHit = traceBlock(origin, direction, maxDistance);
      let best = boundaryHit;
      if (blockHit && blockHit.distance < best.distance) {
        best = blockHit;
      }

      const distance = Math.min(best.distance, maxDistance);
      return {
        ...best,
        distance,
        point: {
          x: origin.x + direction.x * distance,
          y: origin.y + direction.y * distance
        }
      };
    }

    function traceBoundary(origin, direction, maxDistance) {
      let best = { distance: maxDistance, type: "none", side: null };
      if (Math.abs(direction.y) > 0.0001) {
        const targetY = direction.y < 0 ? BALL_RADIUS : GAME_H - BALL_RADIUS;
        const t = (targetY - origin.y) / direction.y;
        if (t > 0 && t < best.distance) {
          best = {
            distance: t,
            type: "boundary",
            side: direction.y < 0 ? "top" : "bottom"
          };
        }
      }
      return best;
    }

    function traceBlock(origin, direction, maxDistance) {
      let best = null;
      for (const block of letterBlocks) {
        if (block.isDestroyed) continue;
        const t = rayRectIntersection(origin, direction, block);
        if (t === null || t < 0 || t > maxDistance) continue;
        if (!best || t < best.distance) {
          best = { distance: t, type: "block" };
        }
      }
      return best || { distance: maxDistance, type: "none" };
    }

    function rayRectIntersection(origin, direction, rect) {
      const expanded = {
        x: rect.x - BALL_RADIUS,
        y: rect.y - BALL_RADIUS,
        width: rect.width + BALL_RADIUS * 2,
        height: rect.height + BALL_RADIUS * 2
      };

      let tEntry = -Infinity;
      let tExit = Infinity;

      if (Math.abs(direction.x) < 0.0001) {
        if (origin.x < expanded.x || origin.x > expanded.x + expanded.width) {
          return null;
        }
      } else {
        const tx1 = (expanded.x - origin.x) / direction.x;
        const tx2 = (expanded.x + expanded.width - origin.x) / direction.x;
        const txMin = Math.min(tx1, tx2);
        const txMax = Math.max(tx1, tx2);
        tEntry = Math.max(tEntry, txMin);
        tExit = Math.min(tExit, txMax);
      }

      if (Math.abs(direction.y) < 0.0001) {
        if (origin.y < expanded.y || origin.y > expanded.y + expanded.height) {
          return null;
        }
      } else {
        const ty1 = (expanded.y - origin.y) / direction.y;
        const ty2 = (expanded.y + expanded.height - origin.y) / direction.y;
        const tyMin = Math.min(ty1, ty2);
        const tyMax = Math.max(ty1, ty2);
        tEntry = Math.max(tEntry, tyMin);
        tExit = Math.min(tExit, tyMax);
      }

      if (tExit >= Math.max(tEntry, 0)) {
        return Math.max(tEntry, 0);
      }

      return null;
    }

    function drawAmmoDisplay() {
      if (!window.TargetWord) return;
      const ammoState = window.TargetWord.state;
      if (!ammoState) return;
      const maxAmmo = ammoState.maxAmmo ?? 6;
      const currentAmmo = ammoState.ammo ?? maxAmmo;
      const ammoSize = 46;
      const gap = 10;
      const hudPadding = HUD_PADDING;
      const ammoPaddingX = Math.max(12, hudPadding + 120);
      const y = GAME_H - hudPadding - ammoSize + 50;

      // Use the player's selected ball skin; fall back to the default ammoImage.
      const _hudBallImg = (window.BallSkins ? window.BallSkins.getSelectedImg() : null) || ammoImage;

      for (let i = 0; i < maxAmmo; i++) {
        const x = ammoPaddingX + i * (ammoSize + gap);
        const isActive = i < currentAmmo;
        ctx.globalAlpha = isActive ? 1 : 0.25;
        if (_hudBallImg && _hudBallImg.complete && _hudBallImg.naturalWidth > 0) {
          ctx.drawImage(_hudBallImg, x, y, ammoSize, ammoSize);
        } else {
          ctx.fillStyle = "rgba(30, 30, 30, 0.9)";
          ctx.beginPath();
          ctx.arc(x + ammoSize / 2, y + ammoSize / 2, ammoSize / 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.globalAlpha = 1;

      const ammoLabel = `${currentAmmo}/${maxAmmo}`;
      const totalWidth = Math.max(0, maxAmmo * ammoSize + Math.max(0, maxAmmo - 1) * gap);
      const labelX = ammoPaddingX + totalWidth + 12;
      ctx.font = "bold 22px PixelFont";
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(ammoLabel, labelX, y + ammoSize / 2);
    }

    function drawWholeFrame(img, frameIndex) {
      ctx.drawImage(
        img,
        frameIndex * FRAME_W, 0, FRAME_W, FRAME_H,
        0, 0, FRAME_W * SCALE, FRAME_H * SCALE
      );
    }

    function drawWheelFrame() {
      const _wheel = (window.CannonSkins ? window.CannonSkins.getWheelImg() : null) || imgWheel;

      const wheelOffsetX =  270;
      const wheelOffsetY =  320;

      if (_wheel === imgWheel) {
        const wheelW = FRAME_W * SCALE * WHEEL_SCALE;
        const wheelH = FRAME_H * SCALE * WHEEL_SCALE;
        ctx.drawImage(
          imgWheel,
          0, 0, FRAME_W, FRAME_H,
          wheelOffsetX, wheelOffsetY, wheelW, wheelH
        );
      } else {
        const skinWheelW = imgCanon.naturalWidth * CANON_SCALE * 0.72;
        const skinWheelH = imgCanon.naturalWidth * CANON_SCALE * 0.72; 
        ctx.drawImage(
          _wheel,
          0, 0, _wheel.naturalWidth, _wheel.naturalHeight,
          wheelOffsetX, wheelOffsetY, skinWheelW, skinWheelH
        );
      }
    }

    function drawRotatedCanon() {
      const _barrel = (window.CannonSkins ? window.CannonSkins.getBarrelImg() : null) || imgCanon;
      const mountX = MOUNT_X * SCALE;
      const mountY = MOUNT_Y * SCALE;

      const drawX = CANON_PIVOT_X * CANON_SCALE;
      const drawY = CANON_PIVOT_Y * CANON_SCALE;

      const canonW = imgCanon.naturalWidth * CANON_SCALE;
      const canonH = imgCanon.naturalHeight * CANON_SCALE;

      ctx.save();
      ctx.translate(mountX, mountY);
      ctx.rotate(cannonAngle);

      ctx.drawImage(
        _barrel,
        0, 0, _barrel.naturalWidth, _barrel.naturalHeight,
        -drawX, -drawY, canonW, canonH
      );

      ctx.restore();
    }

    function drawPlayer() {
      ctx.save();

      ctx.translate(PLAYER_X, PLAYER_Y);
      ctx.scale(PLAYER_SCALE, PLAYER_SCALE);

      drawWholeFrame(imgBody, blinkFrame);
      drawRotatedCanon();
      drawWheelFrame();

      ctx.restore();
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (overlayDirty) {
        updateTargetWordOverlay();
        overlayDirty = false;
      }

      drawScrollingBackground();
      drawBridgeLayer();
      drawRoundBanner();

      drawPlayer();
      drawTrajectoryLine();

      drawLetterBlocks();
      drawFloatingPopups();
      drawLetterHitParticles();
      drawLetterSuccessFlash();
      drawCannonBalls();

    if (targetWordOverlay) {
      targetWordOverlay.classList.toggle("dimmed", gameOver);
    }
    if (window.TargetWord) {
      TargetWord.draw(ctx, letterImages, coinImage, heartImage);
    }
    drawAmmoDisplay();
    drawGameOverOverlay();
    }

    function animate(ts) {
      updateBackgroundMovement(ts);
      if (!lastBlinkTime) lastBlinkTime = ts;

      const elapsed = ts - lastBlinkTime;

      if (blinkState === "open" && elapsed > nextBlinkDelay) {
        blinkFrame = 1;
        blinkState = "closed";
        lastBlinkTime = ts;
      } else if (blinkState === "closed" && elapsed > 130) {
        blinkFrame = 0;
        blinkState = "open";
        lastBlinkTime = ts;
        nextBlinkDelay = 1800 + Math.random() * 2200;
      }

      const canProgress = !gameOver && !gamePaused;
      if (canProgress) {
        updateCannonBalls();
        updateTimer(ts);
        updateBlockAnimations();
        updateLetterHitEffects();
        updateFloatingPopups();
        if (roundMessageTimer > 0) {
          roundMessageTimer = Math.max(0, roundMessageTimer - 1);
        }
      }

      render();
      requestAnimationFrame(animate);
    }

    function getAngleFromMouse(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();

      const pivotX =
        rect.left +
        PLAYER_X +
        (MOUNT_X * SCALE) * PLAYER_SCALE;

      const pivotY =
        rect.top +
        PLAYER_Y +
        (MOUNT_Y * SCALE) * PLAYER_SCALE;

      let angle = Math.atan2(clientY - pivotY, clientX - pivotX);

      if (angle < MIN_ANGLE) angle = MIN_ANGLE;
      if (angle > MAX_ANGLE) angle = MAX_ANGLE;

      return angle;
    }

    // --------------------------------------------------
    // INPUT
    // --------------------------------------------------
    canvas.addEventListener("mousedown", (e) => {
      if (e.button === 0 && !gameOver && !gamePaused) {
        isDragging = true;
        cannonAngle = getAngleFromMouse(e.clientX, e.clientY);
      }
    });

    window.addEventListener("mousemove", (e) => {
      if (gameOver || gamePaused) return;
      cannonAngle = getAngleFromMouse(e.clientX, e.clientY);
    });

    window.addEventListener("mouseup", (e) => {
      if (isDragging && e.button === 0 && !gameOver && !gamePaused) {
        fireCannon();
      }
      isDragging = false;
    });

    canvas.addEventListener("touchstart", (e) => {
      if (gameOver || gamePaused) return;
      isDragging = true;
      const t = e.touches[0];
      cannonAngle = getAngleFromMouse(t.clientX, t.clientY);
      e.preventDefault();
    }, { passive: false });

    window.addEventListener("touchmove", (e) => {
      if (gameOver || gamePaused) return;
      const t = e.touches[0];
      cannonAngle = getAngleFromMouse(t.clientX, t.clientY);
      e.preventDefault();
    }, { passive: false });

    window.addEventListener("touchend", (e) => {
      if (isDragging && !gameOver && !gamePaused) {
        fireCannon();
      }
      isDragging = false;
    });

    // Keyboard controls
    window.addEventListener("keydown", (e) => {
      if (e.code === "Escape") {
        e.preventDefault();
        togglePauseMenu();
        return;
      }
      if (e.code === "Space" && !gameOver && !gamePaused) {
        e.preventDefault();
        fireCannon();
      }
      if (e.code === "KeyR") {
        e.preventDefault();
        restartGame();
      }
    });

    // if (pauseToggleButton) {
    //   addUIButtonPressEffects(pauseToggleButton);
    //   pauseToggleButton.addEventListener("click", (e) => {
    //     e.stopPropagation();
    //     togglePauseMenu();
    //   });
    // }

    // pauseOptionButtons.forEach((btn) => {
    //   addUIButtonPressEffects(btn);
    //   btn.addEventListener("click", () => {
    //     const action = btn.dataset.pauseAction;
    //     if (action) handlePauseAction(action);
    //   });
    // });

    // pauseBackdrop?.addEventListener("click", hidePauseOverlay);

    initPause();

    // --------------------------------------------------
    // LOAD / PRELOADING
    // --------------------------------------------------
    const CRITICAL_IMAGE_COUNT = 12; // background, bridge, character, canon, wheel, HUD coins/hearts/ammo/timer plus the three border pieces
    const OPTIONAL_IMAGE_COUNT = alphabet.length;
    let criticalLoaded = 0;
    let optionalLoaded = 0;
    let criticalAssetsReady = false;

    function finalizeCriticalAssets() {
      FRAME_W = imgBody.naturalWidth / FRAMES;
      FRAME_H = imgBody.naturalHeight;
      canvas.width = GAME_W;
      canvas.height = GAME_H;
    }

    function startGame() {
      const savedGameState = loadSavedGameState();

      function finalizeStart() {
        currentWord = window.TargetWord?.state?.word || currentWord;
        generateLetterBlocks();
        persistGameState();
        startAutoSave();
        render();
        requestAnimationFrame(animate);
      }

      if (window.TargetWord) {
        TargetWord.init().then(() => {
          resetTimerForRound();
          if (window.CannonSkins) CannonSkins.preloadAll();
          if (savedGameState) {
            applySavedGameState(savedGameState);
          }
          finalizeStart();
        });
      } else {
        resetTimerForRound();
        finalizeStart();
      }
    }

    function handleAssetCompletion(isCritical) {
      if (isCritical) {
        criticalLoaded++;
        if (!criticalAssetsReady && criticalLoaded >= CRITICAL_IMAGE_COUNT) {
          criticalAssetsReady = true;
          finalizeCriticalAssets();
          setTimeout(startGame, 0);
        }
      } else {
        optionalLoaded++;
        if (optionalLoaded >= OPTIONAL_IMAGE_COUNT) {
          markTargetWordDirty();
        }
      }
    }

    function trackImage(image, { critical = false, callback } = {}) {
      if (!image) return;
      const complete = () => {
        if (typeof callback === "function") callback();
        handleAssetCompletion(critical);
      };
      if (image.complete) {
        complete();
        return;
      }
      image.addEventListener("load", complete, { once: true });
      image.addEventListener("error", complete, { once: true });
    }

    trackImage(bgImg, { critical: true });
    trackImage(mapBridgeImage, { critical: true });
    trackImage(imgBody, { critical: true });
    trackImage(imgCanon, { critical: true });
    trackImage(imgWheel, { critical: true });
    trackImage(coinImage, { critical: true });
    trackImage(heartImage, { critical: true });
    trackImage(ammoImage, { critical: true });
    trackImage(timerBoxImage, { critical: true, callback: refreshTimerOverlay });
    trackImage(borderLeftElem, { critical: true, callback: updateBorderOverlayPositions });
    trackImage(borderRightElem, { critical: true, callback: updateBorderOverlayPositions });
    trackImage(borderBottomElem, { critical: true, callback: updateBorderOverlayPositions });

    updateThemeForRound(currentRound);

    for (let letter of alphabet) {
      trackImage(letterImages[letter]);
    }

    updateBorderOverlayPositions();
    window.addEventListener("beforeunload", persistGameState);
    window.addEventListener("resize", updateBorderOverlayPositions);
  </script>
